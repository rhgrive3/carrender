<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>StudyCommander 学習司令塔</title>
    <meta name="description" content="試験日から逆算して毎日の勉強計画を自動再設計する学習司令塔" />
    <meta name="theme-color" content="#0b0f1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StudyCmdr" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <style>
      /* Splash-like boot screen shown until React mounts */
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #0b0f1a;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #boot .boot-logo {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: linear-gradient(135deg, #4f7cff, #9a5cff);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        box-shadow: 0 8px 40px rgba(79, 124, 255, 0.45);
        animation: bootpulse 1.4s ease-in-out infinite;
      }
      #boot .boot-name {
        color: #e8ecf8;
        font-family: -apple-system, system-ui, sans-serif;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 0.12em;
      }
      @keyframes bootpulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.07); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot" aria-hidden="true">
      <div class="boot-logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" />
        </svg>
      </div>
      <div class="boot-name">STUDY COMMANDER</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
