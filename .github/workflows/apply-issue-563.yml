name: Apply issue 563 fix

on:
  push:
    branches:
      - fix/issue-563-conflict-refresh-failure
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-563-conflict-refresh-failure
      - name: Apply focused fix and regression contract
        shell: bash
        run: |
          echo '' | base64 -d | gunzip > /tmp/issue563.patch
          git apply --check /tmp/issue563.patch
          git apply /tmp/issue563.patch
          git diff --check
          git rm .github/workflows/apply-issue-563.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/state/AppContextBase.tsx scripts/main-sync-owner-generation.test.ts
          git commit -m "fix: recover conflict refresh failures"
          git push origin HEAD:fix/issue-563-conflict-refresh-failure
