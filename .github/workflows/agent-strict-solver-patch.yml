name: Apply strict solver deterministic patch
on:
  push:
    branches: [fix/strict-solver-deterministic-budget]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/strict-solver-deterministic-budget
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply source and regression test
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const solverPath = 'src/lib/strictSolver.ts';
          let source = fs.readFileSync(solverPath, 'utf8');
          const replace = (before, after) => {
            if (!source.includes(before)) throw new Error(`strictSolver patch target missing: ${before.slice(0, 80)}`);
            source = source.replace(before, after);
          };
          replace(
            ' * - maxNodes / maxMs の探索上限に達したら indeterminate を返す(infeasibleにしない)。',
            ' * - 通常の探索終了はmaxNodesだけで決め、端末速度や負荷で結果を変えない。\n * - emergencyStopはworker取消等の明示的な非常停止専用で、wall-clockは診断値にだけ使う。',
          );
          replace(
            "export interface SolverOptions {\n  maxNodes: number;\n  maxMs: number;\n  /** trueなら期限側の日から先に埋める(最遅スケジュール=最低予約量の算出用) */\n  preferLate: boolean;\n}",
            "export interface SolverOptions {\n  /** 通常探索の決定的budget。端末速度に関係なく同じnodeで終了する。 */\n  maxNodes: number;\n  /** @deprecated wall-clockは探索結果へ影響させず、呼出側互換のためだけに残す。 */\n  maxMs: number;\n  /** worker取消等の明示的な非常停止。通常実行では指定しない。 */\n  emergencyStop?: () => boolean;\n  /** trueなら期限側の日から先に埋める(最遅スケジュール=最低予約量の算出用) */\n  preferLate: boolean;\n}",
          );
          replace(
            "export interface SolveResult {\n  status: 'feasible' | 'infeasible' | 'indeterminate';\n  allocations: Map<string, SlotAllocation[]>;\n  nodes: number;\n  elapsedMs: number;\n}",
            "export interface SolveResult {\n  status: 'feasible' | 'infeasible' | 'indeterminate';\n  allocations: Map<string, SlotAllocation[]>;\n  nodes: number;\n  elapsedMs: number;\n  /** falseなら探索を完了しておらず、infeasibleや最適解として扱ってはいけない。 */\n  exhaustive: boolean;\n  limitReason?: 'nodeBudget' | 'emergencyStop';\n}",
          );
          replace(
            "    return { status: 'infeasible', allocations: new Map(), nodes: 0, elapsedMs: Date.now() - startedAt };",
            "    return { status: 'infeasible', allocations: new Map(), nodes: 0, elapsedMs: Date.now() - startedAt, exhaustive: true };",
          );
          replace(
            "  let nodes = 0;\n  let hitLimit = false;",
            "  let nodes = 0;\n  let hitLimit = false;\n  let limitReason: SolveResult['limitReason'];",
          );
          replace(
            "    if (nodes > options.maxNodes) {\n      hitLimit = true;\n      return false;\n    }\n    if ((nodes & 63) === 0 && Date.now() - startedAt > options.maxMs) {\n      hitLimit = true;\n      return false;\n    }",
            "    if (nodes > options.maxNodes) {\n      hitLimit = true;\n      limitReason = 'nodeBudget';\n      return false;\n    }\n    // wall-clockで探索を打ち切ると、同じ入力でも端末性能や負荷で結果が変わる。\n    // 非常停止は外部から明示された取消だけを、一定node間隔で確認する。\n    if ((nodes & 63) === 0 && options.emergencyStop?.()) {\n      hitLimit = true;\n      limitReason = 'emergencyStop';\n      return false;\n    }",
          );
          replace(
            "    return { status: 'feasible', allocations, nodes, elapsedMs };\n  }\n  return { status: hitLimit ? 'indeterminate' : 'infeasible', allocations: new Map(), nodes, elapsedMs };",
            "    return { status: 'feasible', allocations, nodes, elapsedMs, exhaustive: true };\n  }\n  return {\n    status: hitLimit ? 'indeterminate' : 'infeasible',\n    allocations: new Map(),\n    nodes,\n    elapsedMs,\n    exhaustive: !hitLimit,\n    ...(limitReason ? { limitReason } : {}),\n  };",
          );
          fs.writeFileSync(solverPath, source);

          const test = `import assert from 'node:assert/strict';
import { solveStrict, type SolverDayInput, type SolverItem } from '../src/lib/strictSolver';

const item: SolverItem = {
  id: 'deterministic-long-search',
  release: '2026-07-23',
  deadline: '2026-07-23',
  requiredUnits: 70,
  minutesPerUnit: 1,
  unitStep: 1,
  minChunkUnits: 1,
  maxChunkUnits: 1,
  splittable: true,
  maxUnitsPerDay: 70,
};
const days: SolverDayInput[] = [{ date: '2026-07-23', slots: [{ start: 0, end: 100 }], budget: 100 }];

function allocationHash(result: ReturnType<typeof solveStrict>): string {
  return JSON.stringify([...result.allocations.entries()].map(([id, rows]) => [id, rows]));
}

const originalNow = Date.now;
try {
  let slowClock = 0;
  Date.now = () => { slowClock += 10_000; return slowClock; };
  const slow = solveStrict([item], days, { maxNodes: 1_000, maxMs: 0, preferLate: false });

  let fastClock = 0;
  Date.now = () => fastClock++;
  const fast = solveStrict([item], days, { maxNodes: 1_000, maxMs: 0, preferLate: false });

  assert.equal(slow.status, 'feasible', 'wall-clockが大きく進んでも通常探索を打ち切らない');
  assert.equal(fast.status, 'feasible');
  assert.equal(allocationHash(slow), allocationHash(fast), '端末速度相当の時計差で配置結果を変えない');
  assert.equal(slow.exhaustive, true);

  const limited = solveStrict([item], days, { maxNodes: 10, maxMs: 60_000, preferLate: false });
  assert.equal(limited.status, 'indeterminate');
  assert.equal(limited.exhaustive, false, 'node budget終了を完全探索として扱わない');
  assert.equal(limited.limitReason, 'nodeBudget');

  let checks = 0;
  const cancelled = solveStrict([item], days, {
    maxNodes: 1_000,
    maxMs: 60_000,
    preferLate: false,
    emergencyStop: () => ++checks >= 1,
  });
  assert.equal(cancelled.status, 'indeterminate');
  assert.equal(cancelled.limitReason, 'emergencyStop');
  assert.equal(cancelled.exhaustive, false);
} finally {
  Date.now = originalNow;
}

console.log('✅ strict solver deterministic budget contracts passed');
`;
          fs.writeFileSync('scripts/strict-solver-deterministic-budget.test.ts', test);

          const packagePath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          const marker = 'vite-node scripts/strict-plan-quality-real-data.test.ts';
          if (!pkg.scripts['test:scheduler'].includes('strict-solver-deterministic-budget.test.ts')) {
            pkg.scripts['test:scheduler'] = pkg.scripts['test:scheduler'].replace(marker, `${marker} && vite-node scripts/strict-solver-deterministic-budget.test.ts`);
          }
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);
          fs.rmSync('.github/workflows/agent-strict-solver-patch.yml');
          NODE
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "strict solverを決定的node budgetへ変更する"
          git push origin HEAD:fix/strict-solver-deterministic-budget
