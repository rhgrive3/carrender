name: Apply example-only application test update

on:
  push:
    branches:
      - fix/example-only-ai-and-plan-horizon

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply validated patch
        shell: bash
        run: |
          set -euo pipefail
          patch_file='.github/patches/update-example-only-application-test.patch'
          workflow_file='.github/workflows/apply-example-application-test.yml'
          test -f "$patch_file"
          git apply --check "$patch_file"
          git apply "$patch_file"
          rm "$patch_file" "$workflow_file"
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test: cover example-only AI application flow'
          git push origin "HEAD:${GITHUB_REF_NAME}"
