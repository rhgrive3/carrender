name: Apply doing task guards

on:
  push:
    branches:
      - fix/block-doing-task-mutations-20260721

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/block-doing-task-mutations-20260721
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Patch reducer and tests
        run: |
          python - <<'PY'
          from pathlib import Path

          app_path = Path('src/state/AppContext.tsx')
          app = app_path.read_text()
          old_postpone = """    case 'POSTPONE_TASK': {\n      const task = state.tasks.find((x) => x.id === action.taskId);\n      if (!task || task.status === 'done') return state;\n"""
          new_postpone = """    case 'POSTPONE_TASK': {\n      const task = state.tasks.find((x) => x.id === action.taskId);\n      if (!task || task.status === 'done' || task.status === 'doing') return state;\n"""
          old_move = """    case 'MOVE_TASK': {\n      const task = state.tasks.find((x) => x.id === action.taskId);\n      if (!task || task.status === 'done') return state;\n"""
          new_move = """    case 'MOVE_TASK': {\n      const task = state.tasks.find((x) => x.id === action.taskId);\n      if (!task || task.status === 'done' || task.status === 'doing') return state;\n"""
          if old_postpone not in app or old_move not in app:
              raise SystemExit('Reducer target changed; refusing unsafe patch')
          app = app.replace(old_postpone, new_postpone, 1).replace(old_move, new_move, 1)
          app_path.write_text(app)

          test_path = Path('scripts/doing-task-mutation-guard.test.ts')
          test_path.write_text("""import assert from 'node:assert/strict';
          import { addDays, today } from '../src/lib/date';
          import { appReducer, emptyState } from '../src/state/AppContext';
          import type { AppState, StudyTask } from '../src/types';

          const date = today();
          const now = new Date().toISOString();
          const doingTask: StudyTask = {
            id: 'doing-task', subjectId: 'subject', materialId: null, title: '計測中タスク', rangeLabel: '',
            rangeStart: null, rangeEnd: null, amount: 1, estimatedMinutes: 30, priority: 50, dueDate: addDays(date, 7),
            type: 'new', status: 'doing', scheduledDate: date, scheduledStart: '09:00', scheduledEnd: '09:30',
            generatedBy: 'manual', reviewStage: null, createdAt: now, updatedAt: now, completedAt: null,
            sourceType: 'manual', sourceId: 'doing-task', placementStatus: 'scheduled', placementLock: 'time',
            manualScheduling: { placementPolicy: 'fixedTime', fixedDate: date, fixedStartTime: '09:00', splittable: false },
          };
          const state: AppState = {
            ...emptyState(), onboarded: true,
            subjects: [{ id: 'subject', name: '数学', color: '#4f7cff', importance: 3, weakness: 3 }],
            tasks: [doingTask],
          };

          assert.strictEqual(
            appReducer(state, { type: 'POSTPONE_TASK', taskId: doingTask.id }),
            state,
            '計測中タスクはReducer境界でも延期しない',
          );
          assert.strictEqual(
            appReducer(state, { type: 'MOVE_TASK', taskId: doingTask.id, date: addDays(date, 1) }),
            state,
            '計測中タスクはReducer境界でも別日へ移動しない',
          );

          console.log('✅ doing task mutation guards passed');
          """)

          package_path = Path('package.json')
          package = package_path.read_text()
          marker = 'vite-node scripts/user-request-regressions.test.ts &&'
          replacement = 'vite-node scripts/user-request-regressions.test.ts && vite-node scripts/doing-task-mutation-guard.test.ts &&'
          if marker not in package:
              raise SystemExit('Regression script marker changed; refusing unsafe patch')
          package_path.write_text(package.replace(marker, replacement, 1))

          Path('.github/workflows/apply-doing-task-guard.yml').unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: block moving active timer tasks"
          git push origin HEAD:fix/block-doing-task-mutations-20260721
