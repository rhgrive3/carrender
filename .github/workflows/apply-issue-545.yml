name: Complete issue 545 patch
on:
  push:
    branches: [fix/issue-545-sync-owner-generation]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-545-sync-owner-generation
      - name: Complete stale error guards
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('src/state/AppContextBase.tsx')
          text = path.read_text()
          old = "          } catch (refreshError) {\n            const refresh = refreshError as ApiError;\n"
          new = "          } catch (refreshError) {\n            if (!syncOwnerGeneration.current.isCurrent(ownerToken)) return;\n            const refresh = refreshError as ApiError;\n"
          count = text.count(old)
          assert count == 2, f'expected two refresh catch paths, found {count}'
          text = text.replace(old, new)
          old = "      } catch (caught) {\n        if (cancelled) return;\n        const error = caught as ApiError;\n"
          new = "      } catch (caught) {\n        if (cancelled || !syncOwnerGeneration.current.isCurrent(ownerToken)) return;\n        const error = caught as ApiError;\n"
          assert old in text
          text = text.replace(old, new, 1)
          path.write_text(text)

          test = Path('scripts/main-sync-owner-generation.test.ts')
          value = test.read_text()
          addition = "\nassert.equal(\n  (source.match(/catch \\(refreshError\\) \\{\\n            if \\(!syncOwnerGeneration\\.current\\.isCurrent\\(ownerToken\\)\\) return;/g) ?? []).length,\n  2,\n  'both 409 refresh failures are generation guarded',\n);\n"
          if 'both 409 refresh failures are generation guarded' not in value:
            value = value.replace("console.log('main sync owner-generation guards: ok');", addition + "console.log('main sync owner-generation guards: ok');")
          test.write_text(value)
          PY
      - name: Commit completion
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/state/AppContextBase.tsx scripts/main-sync-owner-generation.test.ts
          git commit -m "test: cover stale sync failure results"
          git push origin HEAD:fix/issue-545-sync-owner-generation
