name: Apply issue 550 patch
on:
  push:
    branches: [fix/issue-550-main-import-owner-race]
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-550-main-import-owner-race
      - name: Apply fix and tests
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('src/screens/SettingsSheet.tsx')
          source = path.read_text()
          old = """  const fileRef = useRef<HTMLInputElement>(null);\n  const pageRef = useRef<HTMLDivElement>(null);\n  const syncInfo = SYNC_STATUS_LABEL[syncStatus] ?? SYNC_STATUS_LABEL.synced;\n"""
          new = """  const fileRef = useRef<HTMLInputElement>(null);\n  const pageRef = useRef<HTMLDivElement>(null);\n  const importReaderRef = useRef<FileReader | null>(null);\n  const importGenerationRef = useRef(0);\n  const importOwnerRef = useRef(user?.id ?? null);\n  const importOpenRef = useRef(open);\n  const [importBusy, setImportBusy] = useState(false);\n  const ownerId = user?.id ?? null;\n  importOwnerRef.current = ownerId;\n  importOpenRef.current = open;\n  const syncInfo = SYNC_STATUS_LABEL[syncStatus] ?? SYNC_STATUS_LABEL.synced;\n"""
          assert old in source
          source = source.replace(old, new, 1)

          anchor = """  useEffect(() => {\n    const signatures = {\n"""
          effect = """  useEffect(() => {\n    importGenerationRef.current += 1;\n    importReaderRef.current?.abort();\n    importReaderRef.current = null;\n    setImportBusy(false);\n    return () => {\n      importGenerationRef.current += 1;\n      importReaderRef.current?.abort();\n      importReaderRef.current = null;\n    };\n  }, [open, ownerId]);\n\n"""
          assert anchor in source
          source = source.replace(anchor, effect + anchor, 1)

          old_import = """  const doImport = (file: File) => {\n    const reader = new FileReader();\n    reader.onload = () => {\n      try {\n        const imported = importJSON(String(reader.result));\n        const appliedState = prepareImportedState(imported);\n        dispatch({ type: 'REPLACE_STATE', state: appliedState });\n        saveStateNow(appliedState);\n        toast('データをインポートしました');\n        onClose();\n      } catch {\n        toast('インポートに失敗しました。ファイルを確認してください');\n      }\n    };\n    reader.readAsText(file);\n  };\n"""
          new_import = """  const doImport = (file: File) => {\n    importReaderRef.current?.abort();\n    const generation = importGenerationRef.current + 1;\n    importGenerationRef.current = generation;\n    const capturedOwnerId = ownerId;\n    const reader = new FileReader();\n    importReaderRef.current = reader;\n    setImportBusy(true);\n\n    const isCurrentImport = () => importGenerationRef.current === generation\n      && importOwnerRef.current === capturedOwnerId\n      && importOpenRef.current;\n    const finishCurrentImport = () => {\n      if (!isCurrentImport()) return;\n      importReaderRef.current = null;\n      setImportBusy(false);\n    };\n\n    reader.onload = () => {\n      if (!isCurrentImport()) return;\n      try {\n        const imported = importJSON(String(reader.result));\n        const appliedState = prepareImportedState(imported);\n        if (!isCurrentImport()) return;\n        dispatch({ type: 'REPLACE_STATE', state: appliedState });\n        saveStateNow(appliedState);\n        finishCurrentImport();\n        toast('データをインポートしました');\n        onClose();\n      } catch {\n        if (!isCurrentImport()) return;\n        finishCurrentImport();\n        toast('インポートに失敗しました。ファイルを確認してください');\n      }\n    };\n    reader.onerror = () => {\n      if (!isCurrentImport()) return;\n      finishCurrentImport();\n      toast('インポートに失敗しました。ファイルを読み込めませんでした');\n    };\n    reader.onabort = () => finishCurrentImport();\n    reader.readAsText(file);\n  };\n"""
          assert old_import in source
          source = source.replace(old_import, new_import, 1)

          old_button = """        <button className=\"btn btn-secondary btn-sm\" style={{ flex: 1 }} onClick={() => fileRef.current?.click()}>\n          <Upload size={14} strokeWidth={2.4} aria-hidden=\"true\" /> インポート\n        </button>\n"""
          new_button = """        <button\n          className=\"btn btn-secondary btn-sm\"\n          style={{ flex: 1 }}\n          onClick={() => fileRef.current?.click()}\n          disabled={importBusy}\n          aria-describedby=\"main-import-status\"\n        >\n          <Upload size={14} strokeWidth={2.4} aria-hidden=\"true\" /> {importBusy ? '読み込み中…' : 'インポート'}\n        </button>\n"""
          assert old_button in source
          source = source.replace(old_button, new_button, 1)

          old_input = """        hidden\n        aria-label=\"バックアップJSONを選択\"\n        onChange={(e) => {\n"""
          new_input = """        hidden\n        disabled={importBusy}\n        aria-label=\"バックアップJSONを選択\"\n        onChange={(e) => {\n"""
          assert old_input in source
          source = source.replace(old_input, new_input, 1)

          status_anchor = """      />\n      <button className=\"btn btn-danger btn-block mt-8\" onClick={doReset}>\n"""
          status_new = """      />\n      <p id=\"main-import-status\" role=\"status\" aria-live=\"polite\" className=\"faint mt-8\">\n        {importBusy ? 'バックアップJSONを読み込んでいます。画面を閉じずにお待ちください。' : ''}\n      </p>\n      <button className=\"btn btn-danger btn-block mt-8\" onClick={doReset} disabled={importBusy}>\n"""
          assert status_anchor in source
          source = source.replace(status_anchor, status_new, 1)
          path.write_text(source)

          test = Path('scripts/main-local-import-owner-race.test.mjs')
          test.write_text("""import assert from 'node:assert/strict';\nimport { readFileSync } from 'node:fs';\n\nconst source = readFileSync('src/screens/SettingsSheet.tsx', 'utf8');\nassert.match(source, /const importGenerationRef = useRef\(0\)/u);\nassert.match(source, /const importOwnerRef = useRef\(user\?\.id \?\? null\)/u);\nassert.match(source, /importGenerationRef\.current \+= 1;[\\s\\S]{0,120}importReaderRef\.current\?\.abort\(\)/u);\nassert.match(source, /importReaderRef\.current\?\.abort\(\);[\\s\\S]{0,160}const generation = importGenerationRef\.current \+ 1/u);\nassert.match(source, /const isCurrentImport = \(\) => importGenerationRef\.current === generation[\\s\\S]{0,160}importOwnerRef\.current === capturedOwnerId[\\s\\S]{0,100}importOpenRef\.current/u);\nassert.match(source, /reader\.onload = \(\) => \{[\\s\\S]{0,80}if \(!isCurrentImport\(\)\) return;[\\s\\S]{0,360}dispatch\(\{ type: 'REPLACE_STATE', state: appliedState \}\);[\\s\\S]{0,100}saveStateNow\(appliedState\)/u);\nassert.match(source, /reader\.onerror = \(\) => \{[\\s\\S]{0,100}if \(!isCurrentImport\(\)\) return/u);\nassert.match(source, /reader\.onabort = \(\) => finishCurrentImport\(\)/u);\nassert.match(source, /disabled=\{importBusy\}[\\s\\S]{0,180}aria-describedby=\"main-import-status\"/u);\nassert.match(source, /id=\"main-import-status\" role=\"status\" aria-live=\"polite\"/u);\nconsole.log('main local import owner race guard: ok');\n""")

          package = Path('package.json')
          text = package.read_text()
          needle = 'vite-node scripts/main-local-import-application.test.ts && '
          assert needle in text
          text = text.replace(needle, needle + 'node scripts/main-local-import-owner-race.test.mjs && ', 1)
          package.write_text(text)

          Path('.github/workflows/apply-issue-550.yml').unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: guard main JSON import by owner and operation generation"
          git push origin HEAD:fix/issue-550-main-import-owner-race
