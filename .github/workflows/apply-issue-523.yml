name: Apply issue 523 implementation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/issue-523-session-side-effect-repair'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-523-session-side-effect-repair
          fetch-depth: 0
      - name: Apply implementation
        shell: bash
        run: |
          cat > src/lib/sessionEffects.ts <<'EOF'
          import type { AppState, Material, StudySession } from '../types';
          import { normalizeUnitRanges, sumRangeLengths, updateMinutesPerUnitEstimate } from './scheduler';

          function subtractRanges(
            ranges: { start: number; end: number }[],
            removals: { start: number; end: number }[],
          ): { start: number; end: number }[] {
            let current = normalizeUnitRanges(ranges, Number.MAX_SAFE_INTEGER);
            for (const removal of normalizeUnitRanges(removals, Number.MAX_SAFE_INTEGER)) {
              current = current.flatMap((range) => {
                if (removal.end < range.start || removal.start > range.end) return [range];
                return [
                  ...(removal.start > range.start ? [{ start: range.start, end: removal.start - 1 }] : []),
                  ...(removal.end < range.end ? [{ start: removal.end + 1, end: range.end }] : []),
                ];
              });
            }
            return current;
          }

          export function rebuildMaterialProgress(
            material: Material,
            beforeSessions: StudySession[],
            nextSessions: StudySession[],
          ): Material {
            const current = material.completedRanges
              ?? (material.doneAmount > 0 ? [{ start: 1, end: material.doneAmount }] : []);
            const beforeContributions = beforeSessions
              .filter((session) => session.materialId === material.id)
              .flatMap((session) => session.progressRangesAdded ?? []);
            const baseline = subtractRanges(current, beforeContributions);
            const nextContributions = nextSessions
              .filter((session) => session.materialId === material.id)
              .flatMap((session) => session.progressRangesAdded ?? []);
            const completedRanges = normalizeUnitRanges(
              [...baseline, ...nextContributions],
              material.totalAmount,
            );
            return { ...material, completedRanges, doneAmount: sumRangeLengths(completedRanges) };
          }

          export function revertSessionEffects(state: AppState, session: StudySession): AppState {
            const sessions = state.sessions.filter((entry) => entry.id !== session.id);
            let tasks = state.tasks.filter((task) =>
              !(session.generatedReviewTaskIds ?? []).includes(task.id)
              && !(session.replacementTaskIds ?? []).includes(task.id));
            if (session.taskSnapshotBefore) {
              tasks = [
                ...tasks.filter((task) => task.id !== session.taskSnapshotBefore!.id),
                session.taskSnapshotBefore,
              ];
            }
            let materials = state.materials.map((material) =>
              rebuildMaterialProgress(material, state.sessions, sessions));
            materials = materials.map((material) => {
              const estimate = updateMinutesPerUnitEstimate(
                material,
                sessions,
                state.settings.estimateAlpha ?? 0.2,
              );
              return {
                ...material,
                minutesPerUnit: estimate.appliedEstimate,
                estimatedMinutesPerUnit:
                  estimate.suggestedEstimate ?? material.estimatedMinutesPerUnit,
              };
            });
            return { ...state, sessions, materials, tasks };
          }
          EOF
          python <<'PY'
          from pathlib import Path

          app = Path('src/state/AppContextBase.tsx')
          source = app.read_text()
          source = source.replace(
              "import { generateReviewTasks } from '../lib/review';",
              "import { generateReviewTasks } from '../lib/review';\nimport { revertSessionEffects } from '../lib/sessionEffects';",
          )
          start = source.index('function subtractRanges(')
          end = source.index('\nfunction recordSession(', start)
          source = source[:start] + source[end:]
          app.write_text(source)

          storage = Path('src/lib/storage.ts')
          source = storage.read_text()
          source = source.replace(
              "import type { AppState, ValidationIssue } from '../types';",
              "import type { AppState, StudySession, ValidationIssue } from '../types';\nimport { revertSessionEffects } from './sessionEffects';",
          )
          old = """function removeNonPositiveLegacySessions(state: AppState): AppState {\n  const sessions = state.sessions.filter((session) => Number.isFinite(session.minutes) && session.minutes > 0);\n  return sessions.length === state.sessions.length ? state : { ...state, sessions };\n}\n"""
          new = """function isValidSessionMinutes(session: StudySession): boolean {\n  return Number.isFinite(session.minutes) && session.minutes > 0;\n}\n\nfunction sessionRepairOrder(left: StudySession, right: StudySession): number {\n  const leftTime = left.updatedAt ?? left.startedAt ?? '';\n  const rightTime = right.updatedAt ?? right.startedAt ?? '';\n  const byTime = rightTime.localeCompare(leftTime);\n  return byTime === 0 ? right.id.localeCompare(left.id) : byTime;\n}\n\n/**\n * Legacy invalid sessions may already have changed progress, task completion,\n * replacement tasks, review tasks, and estimate observations. Remove them in\n * reverse chronological order through the same pure rollback boundary used by\n * record editing instead of dropping only the log row.\n */\nexport function repairNonPositiveLegacySessions(state: AppState): AppState {\n  const invalid = state.sessions.filter((session) => !isValidSessionMinutes(session));\n  if (invalid.length === 0) return state;\n  return [...invalid].sort(sessionRepairOrder).reduce(\n    (current, session) => revertSessionEffects(current, session),\n    state,\n  );\n}\n"""
          if old not in source:
              raise SystemExit('legacy session filter block not found')
          source = source.replace(old, new)
          source = source.replace(
              'const state = removeNonPositiveLegacySessions(migrated.state);',
              'const state = repairNonPositiveLegacySessions(migrated.state);',
          )
          storage.write_text(source)

          test = Path('scripts/app-state-shared-validation.test.ts')
          source = test.read_text()
          source = source.replace(
              "import { importJSON, isAppStateShape, migrateState } from '../src/lib/storage';",
              "import { importJSON, isAppStateShape, migrateState, repairNonPositiveLegacySessions } from '../src/lib/storage';",
          )
          marker = "assert.equal(validateAppStatePayload(repairedSessions.state).ok, true, '移行後stateは共有validatorを通る');\n"
          addition = r'''

          const originalTask = {
            id: 'task-original', subjectId: 'subject-1', materialId: 'material-progress',
            title: '問題1〜2', rangeLabel: '1〜2', rangeStart: 1, rangeEnd: 2,
            amount: 2, estimatedMinutes: 20, priority: 1, dueDate: '2026-07-30',
            type: 'new', status: 'planned', scheduledDate: '2026-07-23',
            scheduledStart: '18:00', scheduledEnd: '18:20', generatedBy: 'auto',
            reviewStage: null, createdAt: now, updatedAt: now, completedAt: null,
          } as const;
          const invalidWithSideEffects = {
            ...validSession,
            id: 'session-zero-effects',
            taskId: originalTask.id,
            materialId: 'material-progress',
            minutes: 0,
            amountDone: 2,
            progressRangesAdded: [{ start: 1, end: 2 }],
            taskSnapshotBefore: originalTask,
            replacementTaskIds: ['task-replacement'],
            generatedReviewTaskIds: ['task-review'],
            updatedAt: '2026-07-23T01:00:00.000Z',
          };
          const sideEffectState = {
            ...valid,
            materials: [{
              id: 'material-progress', subjectId: 'subject-1', name: '数学問題集', unit: '問題',
              totalAmount: 10, doneAmount: 2, completedRanges: [{ start: 1, end: 2 }],
              totalUnits: 10, startDate: '2026-07-01', targetDate: '2026-08-01', priority: 3,
              difficulty: 3, minutesPerUnit: 10, splittable: true, dailyTarget: null,
              weeklyTarget: null, deadlinePolicy: 'normal', examRelevance: 3, reviewEnabled: false,
              reviewIntervals: [], paused: false, round: 1, archived: false, createdAt: now,
            }],
            tasks: [
              { ...originalTask, id: 'task-replacement', status: 'planned' },
              { ...originalTask, id: 'task-review', type: 'review', status: 'planned' },
            ],
            sessions: [validSession, invalidWithSideEffects],
          } as unknown as AppState;
          const repairedSideEffects = repairNonPositiveLegacySessions(sideEffectState);
          assert.deepEqual(repairedSideEffects.sessions.map((session) => session.id), ['session-valid'], '不正sessionだけを除外する');
          assert.deepEqual(repairedSideEffects.materials[0].completedRanges, [], '不正sessionが加えた進捗範囲を戻す');
          assert.equal(repairedSideEffects.materials[0].doneAmount, 0, '不正sessionの進捗量を戻す');
          assert.deepEqual(repairedSideEffects.tasks.map((task) => task.id), ['task-original'], 'replacement・復習を除去して元タスクを復元する');
          assert.equal(repairedSideEffects.tasks[0].status, 'planned', '不正session前のタスク状態を復元する');
          '''
          addition = '\n'.join(line[10:] if line.startswith('          ') else line for line in addition.splitlines()) + '\n'
          if marker not in source:
              raise SystemExit('test insertion marker not found')
          source = source.replace(marker, marker + addition)
          source = source.replace(
              "assert.match(storageSource, /removeNonPositiveLegacySessions[\\s\\S]*Number\\.isFinite\\(session\\.minutes\\) && session\\.minutes > 0/u, '旧sessionの非正数minutesだけを共有検証前に除外する');",
              "assert.match(storageSource, /repairNonPositiveLegacySessions[\\s\\S]*revertSessionEffects/u, '旧sessionの非正数minutesと記録副作用を共有検証前に巻き戻す');",
          )
          source = source.replace(
              "const state = removeNonPositiveLegacySessions\\(migrated\\.state\\)",
              "const state = repairNonPositiveLegacySessions\\(migrated\\.state\\)",
          )
          test.write_text(source)
          PY
          rm .github/workflows/apply-issue-523.yml
      - name: Verify and commit
        shell: bash
        run: |
          npm ci
          npm run typecheck
          npx vite-node scripts/app-state-shared-validation.test.ts
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/lib/sessionEffects.ts src/lib/storage.ts src/state/AppContextBase.tsx scripts/app-state-shared-validation.test.ts .github/workflows/apply-issue-523.yml
          git commit -m '非正数session除外時に記録副作用も巻き戻す'
          git push origin HEAD:fix/issue-523-session-side-effect-repair
