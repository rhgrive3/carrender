name: Apply scheduler capacity optimization on push

on:
  push:
    branches: [fix/scheduler-capacity-search]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/scheduler-capacity-search
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply embedded patch
        run: |
          python3 <<'BOOTSTRAP'
          from pathlib import Path
          from textwrap import dedent
          workflow = Path('.github/workflows/agent-scheduler-capacity.yml').read_text(encoding='utf-8')
          marker = "          python3 <<'PY'\n"
          assert marker in workflow
          embedded = workflow.split(marker, 1)[1].split("\n          PY", 1)[0]
          exec(compile(dedent(embedded), 'capacity-patch.py', 'exec'))
          Path('.github/workflows/agent-scheduler-capacity-push.yml').unlink()
          BOOTSTRAP
          npm ci
          npm run typecheck
          npm run test:scheduler
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "容量計算をprefix sumと二分探索へ最適化する"
          git push origin HEAD:fix/scheduler-capacity-search
