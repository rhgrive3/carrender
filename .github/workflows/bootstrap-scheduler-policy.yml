name: Bootstrap scheduler policy branch
on:
  push:
    paths: [.github/workflows/bootstrap-scheduler-policy.yml]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/scheduler-policy
          fetch-depth: 0
      - name: Patch branch
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json

          Path('src/lib/schedulerPolicy.ts').write_text("""/** Named scheduler tuning values. Existing behaviour is preserved by this policy revision. */
          export const SCHEDULER_POLICY_VERSION = '2026-07-23.1';
          export const ESTIMATE_POLICY = Object.freeze({
            smoothingAlpha: 0.2,
            medianRatioFloor: 0.25,
            medianRatioCeiling: 4,
            madMultiplier: 3,
            maxRelativeDecrease: 0.15,
            maxRelativeIncrease: 0.15,
            minimumSamples: 3,
          });
          export const SCHEDULER_POLICY = Object.freeze({
            strictPreferredFinishRatio: 0.85,
            normalPreferredFinishRatio: 0.9,
            strictMinimumLeadDays: 2,
            normalMinimumLeadDays: 1,
            reserveShortSpanMaxDays: 7,
            reserveMediumSpanMaxDays: 21,
            reserveLongSpanMaxDays: 60,
            reserveShortDays: 1,
            reserveMediumDays: 2,
            reserveLongDays: 5,
            reserveProportion: 0.12,
            strictAdditionalReserveDays: 1,
            balancedLoadStepMinutes: 5,
            maximumCapRelaxationAttempts: 12,
            placementCountCap: 33,
          });
          export function schedulerPolicyReport() {
            return { version: SCHEDULER_POLICY_VERSION, estimate: ESTIMATE_POLICY, scheduler: SCHEDULER_POLICY };
          }
          """, encoding='utf-8')

          p = Path('src/lib/schedulerV2.ts'); s = p.read_text()
          anchor = "import { compareItemsForSearch, countItemPlacements, minutesForUnits, solveStrict } from './strictSolver';\n"
          assert anchor in s
          if "from './schedulerPolicy'" not in s:
            s = s.replace(anchor, anchor + "import { ESTIMATE_POLICY, SCHEDULER_POLICY } from './schedulerPolicy';\n", 1)
          pairs = [
            ('  alpha = 0.2,', '  alpha = ESTIMATE_POLICY.smoothingAlpha,'),
            ('value >= center / 4 && value <= center * 4 && (mad === 0 || Math.abs(value - center) <= mad * 3)', 'value >= center * ESTIMATE_POLICY.medianRatioFloor && value <= center * ESTIMATE_POLICY.medianRatioCeiling && (mad === 0 || Math.abs(value - center) <= mad * ESTIMATE_POLICY.madMultiplier)'),
            ('Math.max(material.minutesPerUnit * 0.85, Math.min(material.minutesPerUnit * 1.15, smoothed))', 'Math.max(material.minutesPerUnit * (1 - ESTIMATE_POLICY.maxRelativeDecrease), Math.min(material.minutesPerUnit * (1 + ESTIMATE_POLICY.maxRelativeIncrease), smoothed))'),
            ("valid.length >= 3 && material.estimateMode === 'auto'", "valid.length >= ESTIMATE_POLICY.minimumSamples && material.estimateMode === 'auto'"),
            ('suggestedEstimate: valid.length >= 3 ? suggested : null,', 'suggestedEstimate: valid.length >= ESTIMATE_POLICY.minimumSamples ? suggested : null,'),
            ("const ratio = material.deadlinePolicy === 'strict' ? 0.85 : 0.9;", "const ratio = material.deadlinePolicy === 'strict' ? SCHEDULER_POLICY.strictPreferredFinishRatio : SCHEDULER_POLICY.normalPreferredFinishRatio;"),
            ("const minimumLead = material.deadlinePolicy === 'strict' ? 2 : 1;", "const minimumLead = material.deadlinePolicy === 'strict' ? SCHEDULER_POLICY.strictMinimumLeadDays : SCHEDULER_POLICY.normalMinimumLeadDays;"),
            ('const baseReserve = span <= 7 ? 1 : span <= 21 ? 2 : span <= 60 ? 5 : Math.ceil(span * 0.12);', 'const baseReserve = span <= SCHEDULER_POLICY.reserveShortSpanMaxDays ? SCHEDULER_POLICY.reserveShortDays : span <= SCHEDULER_POLICY.reserveMediumSpanMaxDays ? SCHEDULER_POLICY.reserveMediumDays : span <= SCHEDULER_POLICY.reserveLongSpanMaxDays ? SCHEDULER_POLICY.reserveLongDays : Math.ceil(span * SCHEDULER_POLICY.reserveProportion);'),
            ("const reserve = input.deadlinePolicy === 'strict' ? baseReserve + 1 : baseReserve;", "const reserve = input.deadlinePolicy === 'strict' ? baseReserve + SCHEDULER_POLICY.strictAdditionalReserveDays : baseReserve;"),
            ('  minimumStepMinutes = 5,', '  minimumStepMinutes = SCHEDULER_POLICY.balancedLoadStepMinutes,'),
            ('attempt < 12 && !necessaryBoundsHold()', 'attempt < SCHEDULER_POLICY.maximumCapRelaxationAttempts && !necessaryBoundsHold()'),
          ]
          for old,new in pairs:
            assert old in s, old
            s=s.replace(old,new,1)
          p.write_text(s, encoding='utf-8')

          p=Path('src/lib/strictSolver.ts'); s=p.read_text()
          if "from './schedulerPolicy'" not in s:
            s=s.replace("import type { ISODate } from '../types';\n", "import type { ISODate } from '../types';\nimport { SCHEDULER_POLICY } from './schedulerPolicy';\n",1)
          assert 'cap = 33' in s
          s=s.replace('cap = 33','cap = SCHEDULER_POLICY.placementCountCap',1)
          p.write_text(s,encoding='utf-8')

          p=Path('src/types.ts'); s=p.read_text(); marker='export interface ScheduleGenerationResult {'
          assert marker in s
          if 'export interface SchedulerPolicyReport {' not in s:
            s=s.replace(marker,"export interface SchedulerPolicyReport {\n  version: string;\n  estimate: Readonly<Record<string, number>>;\n  scheduler: Readonly<Record<string, number>>;\n}\n\n"+marker,1)
            s=s.replace(marker,marker+"\n  policy?: SchedulerPolicyReport;",1)
          p.write_text(s,encoding='utf-8')

          p=Path('src/lib/schedulerRecovery.ts'); s=p.read_text()
          anchor="import { smoothMaterialScheduleSafely } from './safeMaterialScheduleSmoothing';\n"
          if "from './schedulerPolicy'" not in s:
            s=s.replace(anchor,anchor+"import { schedulerPolicyReport } from './schedulerPolicy';\n",1)
          s=s.replace('if (materialErrors.length > 0) return invalidMaterialScheduleResult(context, materialErrors);','if (materialErrors.length > 0) return { ...invalidMaterialScheduleResult(context, materialErrors), policy: schedulerPolicyReport() };',1)
          s=s.replace('return smoothMaterialScheduleSafely(state, generateBasePlanV2(state, context), context);','return { ...smoothMaterialScheduleSafely(state, generateBasePlanV2(state, context), context), policy: schedulerPolicyReport() };',1)
          marker='  return {\n    ...result,\n    scheduledTasks:'
          assert marker in s
          s=s.replace(marker,'  return {\n    ...result,\n    policy: schedulerPolicyReport(),\n    scheduledTasks:',1)
          p.write_text(s,encoding='utf-8')

          Path('scripts/scheduler-policy.test.ts').write_text("""import assert from 'node:assert/strict';
          import { emptyState } from '../src/state/AppContext';
          import { generatePlan } from '../src/lib/scheduler';
          import { ESTIMATE_POLICY, SCHEDULER_POLICY, SCHEDULER_POLICY_VERSION } from '../src/lib/schedulerPolicy';
          assert.equal(ESTIMATE_POLICY.minimumSamples, 3);
          assert.equal(SCHEDULER_POLICY.reserveProportion, 0.12);
          assert.equal(SCHEDULER_POLICY.maximumCapRelaxationAttempts, 12);
          const one = generatePlan(emptyState(), '2026-07-23', 'policy regression', { now: new Date('2026-07-23T00:00:00.000Z'), generationId: 'policy-regression' });
          const two = generatePlan(emptyState(), '2026-07-23', 'policy regression', { now: new Date('2026-07-23T00:00:00.000Z'), generationId: 'policy-regression' });
          assert.equal(one.state.lastScheduleResult?.policy?.version, SCHEDULER_POLICY_VERSION);
          assert.deepEqual(one.state.lastScheduleResult?.policy, two.state.lastScheduleResult?.policy);
          assert.deepEqual(one.state.tasks, two.state.tasks);
          console.log('✅ scheduler named policy contracts passed');
          """,encoding='utf-8')

          p=Path('package.json'); data=json.loads(p.read_text()); cmd='vite-node scripts/scheduler-policy.test.ts'
          if cmd not in data['scripts']['test:scheduler']:
            data['scripts']['test:scheduler'] += ' && ' + cmd
          p.write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          for name in ['.github/workflows/agent-scheduler-policy.yml','.agent-scheduler-policy-trigger']:
            q=Path(name)
            if q.exists(): q.unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "スケジューラ調整値を名前付きpolicyへ集約する"
          git push origin HEAD:fix/scheduler-policy
