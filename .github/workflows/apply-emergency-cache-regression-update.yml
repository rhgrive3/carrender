name: Apply emergency cache regression update

on:
  push:
    branches:
      - agent/fix-emergency-cache-overflow

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-emergency-cache-overflow
          fetch-depth: 0

      - name: Update regression contract
        run: node scripts/apply-emergency-cache-regression-update.mjs

      - name: Commit generated update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: expect silent emergency cache fallback on quota"
          git push origin HEAD:agent/fix-emergency-cache-overflow
