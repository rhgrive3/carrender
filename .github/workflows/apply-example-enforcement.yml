name: Apply example-only AI enforcement

on:
  push:
    branches:
      - fix/example-only-ai-and-plan-horizon

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply validated patch
        shell: bash
        run: |
          set -euo pipefail
          patch_file='.github/patches/enforce-example-only-ai.patch'
          workflow_file='.github/workflows/apply-example-enforcement.yml'
          test -f "$patch_file"
          git apply --check "$patch_file"
          git apply "$patch_file"
          rm "$patch_file" "$workflow_file"
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: enforce example-only AI imports'
          git push origin "HEAD:${GITHUB_REF_NAME}"
