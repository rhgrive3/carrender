name: Apply full audit fixes

on:
  push:
    branches:
      - audit/full-review-2026-07-14
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/full-review-2026-07-14
          fetch-depth: 0
      - name: Verify and apply audit patch
        shell: bash
        run: |
          set -euo pipefail
          sha256sum .github/audit-lines/part-*
          cat .github/audit-lines/part-* > /tmp/full-audit.patch
          wc -c /tmp/full-audit.patch
          sha256sum /tmp/full-audit.patch
          test "$(sha256sum /tmp/full-audit.patch | cut -d' ' -f1)" = "4cb14e0071f5f996ca73b301b830ebed7408e2dac989977d58197582a559cc32"
          git apply --check /tmp/full-audit.patch
          git apply /tmp/full-audit.patch
          rm -rf .github/audit-lines .github/audit-patch
          rm .github/workflows/apply-full-audit-fixes.yml
          rm -f .audit-apply-trigger
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: resolve full-audit data integrity defects and remove dead code'
          git push origin HEAD:audit/full-review-2026-07-14
