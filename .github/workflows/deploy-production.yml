name: Deploy production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      PAGES_PROJECT_NAME: study-plan-v1
    steps:
      - name: Checkout verified revision
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Skip stale automatic deployment
        if: github.event_name == 'workflow_run'
        run: |
          git fetch --no-tags origin main
          CURRENT_MAIN_SHA="$(git rev-parse origin/main)"
          if [ "$DEPLOY_SHA" != "$CURRENT_MAIN_SHA" ]; then
            echo "Skipping stale deployment: verified $DEPLOY_SHA, current main is $CURRENT_MAIN_SHA"
            exit 78
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Require Cloudflare deployment credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID must be configured in the production environment." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Apply production D1 migrations
        run: npm run d1:migrate

      - name: Verify production D1 schema version
        run: npm run d1:verify:remote

      - name: Build only after migration gate
        env:
          CF_PAGES: '1'
          MIGRATION_GATE_PASSED: '5'
        run: npm run build

      - name: Deploy verified build to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name "$PAGES_PROJECT_NAME" --branch main
