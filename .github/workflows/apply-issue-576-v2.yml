name: Apply issue 576 v2 fix

on:
  push:
    branches:
      - fix/issue-576-memory-refresh-warnings-v2

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-576-memory-refresh-warnings-v2
      - name: Apply remaining refresh warning fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          def replace_once(path, old, new):
              p=Path(path); s=p.read_text()
              if old not in s: raise SystemExit(f'pattern not found in {path}')
              p.write_text(s.replace(old,new,1))
          replace_once('src/features/memory/ui/MemoryBulkEditor.tsx', """      try {
                await refresh();
              } catch (caught) {
                console.warn('暗記カード一括保存後に一覧を更新できませんでした', caught);
              }
              if (!isCurrentAction()) return;
              void requestSync(true).catch(() => undefined);
              toast(`${result.imported}件を一括保存しました${result.skipped ? `（${result.skipped}件スキップ）` : ''}`);
          """, """      let refreshWarning = false;
              try {
                await refresh();
              } catch (caught) {
                console.warn('暗記カード一括保存後に一覧を更新できませんでした', caught);
                refreshWarning = true;
              }
              if (!isCurrentAction()) return;
              void requestSync(true).catch(() => undefined);
              toast(refreshWarning
                ? `${result.imported}件は保存済みですが、一覧を更新できませんでした。アプリを再読み込みしてください`
                : `${result.imported}件を一括保存しました${result.skipped ? `（${result.skipped}件スキップ）` : ''}`);
          """)
          replace_once('src/features/memory/ui/MemorySetDetail.tsx', """      await deleteMemorySet(repository, set);
              try {
                await refresh();
              } catch (caught) {
                console.error('暗記セット削除後の一覧更新に失敗しました', caught);
              }
              requestSyncSafely();
              if (isCurrent()) navigate({ name: 'home' });
          """, """      await deleteMemorySet(repository, set);
              let refreshWarning = false;
              try {
                await refresh();
              } catch (caught) {
                console.error('暗記セット削除後の一覧更新に失敗しました', caught);
                refreshWarning = true;
              }
              requestSyncSafely();
              if (isCurrent()) {
                if (refreshWarning) toast('セットは削除済みですが、一覧を更新できませんでした。アプリを再読み込みしてください');
                navigate({ name: 'home' });
              }
          """)
          test=Path('scripts/memory-resilience-contract.test.mjs')
          s=test.read_text()
          s=s.replace("const [resultSource, detailSource, homeSource, setupSource, studySource, contextSource, materialsSource, conflictsSource, backupRestoreSource] = await Promise.all([", "const [resultSource, detailSource, homeSource, setupSource, studySource, contextSource, materialsSource, conflictsSource, backupRestoreSource, editorSource, bulkEditorSource] = await Promise.all([",1)
          s=s.replace("  readFile(new URL('../src/features/memory/ui/MemoryBackupRestore.tsx', import.meta.url), 'utf8'),\n]);", "  readFile(new URL('../src/features/memory/ui/MemoryBackupRestore.tsx', import.meta.url), 'utf8'),\n  readFile(new URL('../src/features/memory/ui/MemoryEditor.tsx', import.meta.url), 'utf8'),\n  readFile(new URL('../src/features/memory/ui/MemoryBulkEditor.tsx', import.meta.url), 'utf8'),\n]);",1)
          marker="assert.match(detailSource, /role=\"alert\"[\\s\\S]*?暗記セットを開けませんでした[\\s\\S]*?再読み込み/, 'セット詳細に読込失敗と再試行を表示する');\n"
          extra=marker+"""
assert.match(editorSource, /let refreshWarning = false;[\s\S]*?await refresh\(\);[\s\S]*?refreshWarning = true;/, 'カード保存後の一覧更新失敗を部分成功として保持する');
assert.match(editorSource, /requestSync\(true\)[\s\S]*?refreshWarning[\s\S]*?カードは更新済みですが、一覧を更新できませんでした。アプリを再読み込みしてください/, 'カード保存済みwarning後も同期要求を維持する');
assert.match(bulkEditorSource, /let refreshWarning = false;[\s\S]*?await refresh\(\);[\s\S]*?refreshWarning = true;/, '一括保存後の一覧更新失敗を部分成功として保持する');
assert.match(bulkEditorSource, /requestSync\(true\)[\s\S]*?refreshWarning[\s\S]*?件は保存済みですが、一覧を更新できませんでした。アプリを再読み込みしてください[\s\S]*?navigate/, '一括保存済みwarning後も同期要求と遷移を維持する');
assert.match(detailSource, /deleteMemorySet[\s\S]*?let refreshWarning = false;[\s\S]*?refreshWarning = true;[\s\S]*?セットは削除済みですが、一覧を更新できませんでした。アプリを再読み込みしてください[\s\S]*?navigate\(\{ name: 'home' \}\)/, 'セット削除済みwarningを通知してhome遷移を維持する');
"""
          if marker not in s: raise SystemExit('test marker not found')
          test.write_text(s.replace(marker,extra,1))
          PY
          git diff --check
          node scripts/memory-resilience-contract.test.mjs
          git rm .github/workflows/apply-issue-576-v2.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/features/memory/ui/MemoryBulkEditor.tsx src/features/memory/ui/MemorySetDetail.tsx scripts/memory-resilience-contract.test.mjs
          git commit -m "fix: finish memory refresh partial-success warnings"
          git push origin HEAD:fix/issue-576-memory-refresh-warnings-v2
