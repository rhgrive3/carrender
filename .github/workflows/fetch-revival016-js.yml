name: Fetch revival016 JS

on:
  push:
    branches:
      - tmp-fetch-revival016-20260712

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp-fetch-revival016-20260712
      - name: Fetch JS with browser headers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p retrieved
          url='https://prd-game-a-granbluefantasy.akamaized.net/assets/1783577434/js/event/revival016/view/minigame/scenes/start.js'
          curl -L --fail-with-body --retry 3 --retry-delay 2 \
            -A 'Mozilla/5.0 (iPad; CPU OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1' \
            -H 'Accept: */*' \
            -H 'Referer: https://game.granbluefantasy.jp/' \
            -H 'Accept-Language: ja-JP,ja;q=0.9,en-US;q=0.8,en;q=0.7' \
            -D retrieved/start.headers.txt \
            "$url" \
            -o retrieved/start.js
          test -s retrieved/start.js
          file retrieved/start.js > retrieved/start.file.txt
          wc -c retrieved/start.js > retrieved/start.size.txt
      - name: Commit fetched files
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add retrieved
          git commit -m 'Fetch revival016 start.js' || exit 0
          git push origin HEAD:tmp-fetch-revival016-20260712
