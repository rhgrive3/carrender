name: Fetch revival016 JS

on:
  push:
    branches:
      - tmp-fetch-revival016-20260712

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp-fetch-revival016-20260712
      - name: Fetch weapon-analysis JS with browser headers
        shell: bash
        run: |
          set -euo pipefail
          base='https://prd-game-a-granbluefantasy.akamaized.net/assets/1783577434/js'
          ua='Mozilla/5.0 (iPad; CPU OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1'
          mkdir -p retrieved/modules
          cat > /tmp/paths.txt <<'EOF'
          event/revival016/view/minigame/scenes/start.js
          event/revival016/view/minigame/scenes/storage.js
          event/revival016/view/minigame/scenes/battle.js
          event/revival016/view/minigame/util/common.js
          event/revival016/view/minigame/constant/object_status.js
          event/revival016/view/minigame/subview/storage_menu.js
          event/revival016/view/minigame/subview/item_detail_window.js
          event/revival016/view/minigame/constant/battle.js
          event/revival016/view/minigame/battle/bag.js
          event/revival016/view/minigame/battle/item.js
          event/revival016/view/minigame/battle/util.js
          util/cjs_weapon.js
          EOF
          : > retrieved/weapon_modules.bundle.txt
          while IFS= read -r path; do
            [ -n "$path" ] || continue
            out="retrieved/modules/$path"
            mkdir -p "$(dirname "$out")"
            curl -L --fail-with-body --retry 3 --retry-delay 2 \
              -A "$ua" \
              -H 'Accept: */*' \
              -H 'Referer: https://game.granbluefantasy.jp/' \
              -H 'Accept-Language: ja-JP,ja;q=0.9,en-US;q=0.8,en;q=0.7' \
              "$base/$path" \
              -o "$out"
            test -s "$out"
            printf '\n===== FILE: %s =====\n' "$path" >> retrieved/weapon_modules.bundle.txt
            cat "$out" >> retrieved/weapon_modules.bundle.txt
            printf '\n' >> retrieved/weapon_modules.bundle.txt
          done < /tmp/paths.txt
          grep -RhoE '[A-Za-z0-9_/-]*revival016/rest/minigame/[A-Za-z0-9_/?=&.-]+' retrieved/modules \
            | sort -u > retrieved/api_endpoints.txt || true
          find retrieved/modules -type f -printf '%P\t%s bytes\n' | sort > retrieved/files.tsv
      - name: Commit fetched files
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add retrieved
          git commit -m 'Fetch revival016 weapon-analysis JS modules' || exit 0
          git push origin HEAD:tmp-fetch-revival016-20260712
