name: Fetch revival016 JS

on:
  push:
    branches:
      - tmp-fetch-revival016-20260712

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp-fetch-revival016-20260712

      - name: Fetch all minigame JavaScript
        shell: bash
        run: |
          set -euo pipefail
          base='https://prd-game-a-granbluefantasy.akamaized.net/assets/1783577434/js'
          ua='Mozilla/5.0 (iPad; CPU OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1'
          rm -rf retrieved/all-modules
          mkdir -p retrieved/all-modules
          cat > /tmp/revival016-paths.txt <<'EOF'
          event/revival016/router/revival016-router.js
          event/revival016/view/minigame/index.js
          event/revival016/view/minigame/constant/scene_name.js
          event/revival016/view/minigame/main.js
          event/revival016/view/minigame/util/scene_factory.js
          event/revival016/view/minigame/scenes/start.js
          event/revival016/view/minigame/scenes/storage.js
          event/revival016/view/minigame/scenes/battle.js
          event/revival016/view/minigame/constant/start.js
          event/revival016/view/minigame/util/start.js
          event/revival016/view/minigame/subview/minigame_help.js
          event/revival016/view/minigame/util/common.js
          event/revival016/view/minigame/constant/object_status.js
          event/revival016/view/minigame/subview/storage_menu.js
          event/revival016/view/minigame/subview/item_detail_window.js
          event/revival016/view/minigame/util/cjs_storage_effect.js
          event/revival016/view/minigame/constant/battle.js
          event/revival016/view/minigame/constant/job_motion_label.js
          event/revival016/view/minigame/battle/cjs_canvas_view.js
          event/revival016/view/minigame/battle/pc_status_gauges.js
          event/revival016/view/minigame/subview/minigame_result.js
          event/revival016/view/minigame/battle/cjs_stage.js
          event/revival016/view/minigame/battle/cjs_no_stage.js
          event/revival016/view/minigame/battle/player_character_cjs_view.js
          event/revival016/view/minigame/battle/buff_icon_list.js
          event/revival016/view/minigame/battle/bag.js
          event/revival016/view/minigame/battle/item.js
          event/revival016/view/minigame/battle/cjs_special.js
          event/revival016/view/minigame/battle/cjs_sp_cutin.js
          event/revival016/view/minigame/battle/util.js
          model/manifest/april2025_reroll.js
          model/manifest/april2025_sierokarte.js
          model/manifest/april2025_mix.js
          model/data.js
          model/token-data.js
          util/request.js
          util/ajax.js
          util/cjs_weapon.js
          view/content.js
          EOF

          : > retrieved/all_fetch_failures.txt
          while IFS= read -r path; do
            [ -n "$path" ] || continue
            out="retrieved/all-modules/$path"
            mkdir -p "$(dirname "$out")"
            if ! curl -sS -L --fail --retry 2 --retry-delay 1 \
              -A "$ua" \
              -H 'Accept: */*' \
              -H 'Referer: https://game.granbluefantasy.jp/' \
              "$base/$path" -o "$out"; then
              echo "$path" >> retrieved/all_fetch_failures.txt
              rm -f "$out"
            fi
          done < /tmp/revival016-paths.txt

      - name: Extract static facts
        shell: bash
        run: |
          set -euo pipefail
          find retrieved/all-modules -type f -printf '%P\t%s bytes\n' | sort > retrieved/all_files.tsv
          grep -RhoE 'revival016/rest/minigame/[A-Za-z0-9_/?=&.\-]+' retrieved/all-modules | sort -u > retrieved/all_api_endpoints.txt || true
          grep -RhoE '(100|200|300)[0-9]{3}' retrieved/all-modules | sort -nu > retrieved/static_item_like_ids.txt || true
          grep -RhoE '(attack_damage_min|attack_damage_max|use_stamina|hit_rate|recast_count|add_skill_gauge|effect_text|has_buff_kind|has_debuff_kind|is_evolution|evolution|rarity|category|recipe|star_block_list|item_block|item_id|item_index)' retrieved/all-modules | sort -u > retrieved/static_weapon_fields.txt || true
          grep -RnoE '(100|200|300)[0-9]{3}' retrieved/all-modules > retrieved/static_item_id_contexts.txt || true
          cat retrieved/all-modules/event/revival016/view/minigame/constant/battle.js > retrieved/battle_constants.js
          cat retrieved/all-modules/event/revival016/view/minigame/battle/item.js > retrieved/battle_item_runtime.js
          cat retrieved/all-modules/event/revival016/view/minigame/util/common.js > retrieved/common_item_parser.js

      - name: Commit results
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add retrieved
          git commit -m 'Fetch all revival016 JS and static facts' || exit 0
          git push origin HEAD:tmp-fetch-revival016-20260712
