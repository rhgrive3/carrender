name: Apply scheduler policy refactor

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/fix-scheduler-policy' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-scheduler-policy
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply deterministic policy refactor
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json

          policy = '''import type { SchedulerPolicySnapshot } from '../types';

/**
 * Scheduler tuning policy.
 *
 * These values intentionally preserve existing planning behaviour. Keeping them
 * together makes later changes reviewable as one policy revision instead of an
 * accidental collection of unrelated magic-number edits.
 */
export const SCHEDULER_POLICY_VERSION = '2026-07-23.1';

export const ESTIMATE_POLICY = Object.freeze({
  /** Exponential smoothing weight applied to the newest observed median. */
  smoothingAlpha: 0.2,
  /** Reject samples below one quarter or above four times the median. */
  medianRatioFloor: 0.25,
  medianRatioCeiling: 4,
  /** Robust outlier threshold measured in median absolute deviations. */
  madMultiplier: 3,
  /** One update may reduce or increase the estimate by at most 15%. */
  maxRelativeDecrease: 0.15,
  maxRelativeIncrease: 0.15,
  /** Do not suggest or apply an automatic estimate with fewer samples. */
  minimumSamples: 3,
});

export const SCHEDULER_POLICY = Object.freeze({
  /** Target 15%/10% of the material span as strict/normal deadline buffer. */
  strictPreferredFinishRatio: 0.85,
  normalPreferredFinishRatio: 0.9,
  strictMinimumLeadDays: 2,
  normalMinimumLeadDays: 1,
  reserveShortSpanMaxDays: 7,
  reserveMediumSpanMaxDays: 21,
  reserveLongSpanMaxDays: 60,
  reserveShortDays: 1,
  reserveMediumDays: 2,
  reserveLongDays: 5,
  reserveProportion: 0.12,
  strictAdditionalReserveDays: 1,
  /** Daily load caps are searched in five-minute increments. */
  balancedLoadStepMinutes: 5,
  /** Prevent cap relaxation from becoming an unbounded loop. */
  maximumCapRelaxationAttempts: 12,
  /** Enough candidate information for deterministic search ordering. */
  placementCountCap: 33,
});

export function schedulerPolicyReport(): SchedulerPolicySnapshot {
  return {
    version: SCHEDULER_POLICY_VERSION,
    estimate: { ...ESTIMATE_POLICY },
    scheduler: { ...SCHEDULER_POLICY },
  };
}
'''
          Path('src/lib/schedulerPolicy.ts').write_text(policy, encoding='utf-8')

          p = Path('src/lib/schedulerV2.ts')
          s = p.read_text()
          needle = "import { compareItemsForSearch, countItemPlacements, minutesForUnits, solveStrict } from './strictSolver';\n"
          assert needle in s
          s = s.replace(needle, needle + "import { ESTIMATE_POLICY, SCHEDULER_POLICY } from './schedulerPolicy';\n", 1)
          replacements = {
            '  alpha = 0.2,': '  alpha = ESTIMATE_POLICY.smoothingAlpha,',
            'value >= center / 4 && value <= center * 4 && (mad === 0 || Math.abs(value - center) <= mad * 3)': 'value >= center * ESTIMATE_POLICY.medianRatioFloor\n      && value <= center * ESTIMATE_POLICY.medianRatioCeiling\n      && (mad === 0 || Math.abs(value - center) <= mad * ESTIMATE_POLICY.madMultiplier)',
            'Math.max(material.minutesPerUnit * 0.85, Math.min(material.minutesPerUnit * 1.15, smoothed))': 'Math.max(\n    material.minutesPerUnit * (1 - ESTIMATE_POLICY.maxRelativeDecrease),\n    Math.min(material.minutesPerUnit * (1 + ESTIMATE_POLICY.maxRelativeIncrease), smoothed),\n  )',
            "valid.length >= 3 && material.estimateMode === 'auto'": "valid.length >= ESTIMATE_POLICY.minimumSamples && material.estimateMode === 'auto'",
            'suggestedEstimate: valid.length >= 3 ? suggested : null,': 'suggestedEstimate: valid.length >= ESTIMATE_POLICY.minimumSamples ? suggested : null,',
            "const ratio = material.deadlinePolicy === 'strict' ? 0.85 : 0.9;": "const ratio = material.deadlinePolicy === 'strict'\n    ? SCHEDULER_POLICY.strictPreferredFinishRatio\n    : SCHEDULER_POLICY.normalPreferredFinishRatio;",
            "const minimumLead = material.deadlinePolicy === 'strict' ? 2 : 1;": "const minimumLead = material.deadlinePolicy === 'strict'\n    ? SCHEDULER_POLICY.strictMinimumLeadDays\n    : SCHEDULER_POLICY.normalMinimumLeadDays;",
            'const baseReserve = span <= 7 ? 1 : span <= 21 ? 2 : span <= 60 ? 5 : Math.ceil(span * 0.12);': 'const baseReserve = span <= SCHEDULER_POLICY.reserveShortSpanMaxDays\n    ? SCHEDULER_POLICY.reserveShortDays\n    : span <= SCHEDULER_POLICY.reserveMediumSpanMaxDays\n      ? SCHEDULER_POLICY.reserveMediumDays\n      : span <= SCHEDULER_POLICY.reserveLongSpanMaxDays\n        ? SCHEDULER_POLICY.reserveLongDays\n        : Math.ceil(span * SCHEDULER_POLICY.reserveProportion);',
            "const reserve = input.deadlinePolicy === 'strict' ? baseReserve + 1 : baseReserve;": "const reserve = input.deadlinePolicy === 'strict'\n    ? baseReserve + SCHEDULER_POLICY.strictAdditionalReserveDays\n    : baseReserve;",
            '  minimumStepMinutes = 5,': '  minimumStepMinutes = SCHEDULER_POLICY.balancedLoadStepMinutes,',
            'attempt < 12 && !necessaryBoundsHold()': 'attempt < SCHEDULER_POLICY.maximumCapRelaxationAttempts && !necessaryBoundsHold()',
          }
          for old, new in replacements.items():
            assert old in s, old
            s = s.replace(old, new, 1)
          p.write_text(s, encoding='utf-8')

          p = Path('src/lib/strictSolver.ts')
          s = p.read_text()
          marker = "import type { ISODate } from '../types';\n"
          assert marker in s
          s = s.replace(marker, marker + "import { SCHEDULER_POLICY } from './schedulerPolicy';\n", 1)
          assert 'cap = 33' in s
          s = s.replace('cap = 33', 'cap = SCHEDULER_POLICY.placementCountCap', 1)
          p.write_text(s, encoding='utf-8')

          p = Path('src/types/index.ts')
          s = p.read_text()
          marker = 'export interface ScheduleGenerationResult {'
          assert marker in s
          report = "export interface SchedulerPolicySnapshot {\n  version: string;\n  estimate: Readonly<Record<string, number>>;\n  scheduler: Readonly<Record<string, number>>;\n}\n\n"
          assert 'export interface SchedulerPolicySnapshot' not in s
          s = s.replace(marker, report + marker, 1)
          s = s.replace(marker, marker + '\n  /** Exact named policy used to produce this result. */\n  policy?: SchedulerPolicySnapshot;', 1)
          p.write_text(s, encoding='utf-8')

          p = Path('src/lib/schedulerRecovery.ts')
          s = p.read_text()
          import_marker = "import { smoothMaterialScheduleSafely } from './safeMaterialScheduleSmoothing';\n"
          assert import_marker in s
          s = s.replace(import_marker, import_marker + "import { schedulerPolicyReport } from './schedulerPolicy';\n", 1)
          old = 'if (materialErrors.length > 0) return invalidMaterialScheduleResult(context, materialErrors);'
          assert old in s
          s = s.replace(old, 'if (materialErrors.length > 0) return { ...invalidMaterialScheduleResult(context, materialErrors), policy: schedulerPolicyReport() };', 1)
          old = 'return smoothMaterialScheduleSafely(state, generateBasePlanV2(state, context), context);'
          assert old in s
          s = s.replace(old, 'return { ...smoothMaterialScheduleSafely(state, generateBasePlanV2(state, context), context), policy: schedulerPolicyReport() };', 1)
          marker = '  return {\n    ...result,\n    scheduledTasks:'
          assert marker in s
          s = s.replace(marker, '  return {\n    ...result,\n    policy: schedulerPolicyReport(),\n    scheduledTasks:', 1)
          p.write_text(s, encoding='utf-8')

          test = '''import assert from 'node:assert/strict';
import { emptyState } from '../src/state/AppContextBase';
import { generatePlan } from '../src/lib/scheduler';
import { ESTIMATE_POLICY, SCHEDULER_POLICY, SCHEDULER_POLICY_VERSION } from '../src/lib/schedulerPolicy';

assert.equal(ESTIMATE_POLICY.smoothingAlpha, 0.2);
assert.equal(ESTIMATE_POLICY.minimumSamples, 3);
assert.equal(SCHEDULER_POLICY.strictPreferredFinishRatio, 0.85);
assert.equal(SCHEDULER_POLICY.normalPreferredFinishRatio, 0.9);
assert.equal(SCHEDULER_POLICY.reserveProportion, 0.12);
assert.equal(SCHEDULER_POLICY.maximumCapRelaxationAttempts, 12);
assert.equal(SCHEDULER_POLICY.placementCountCap, 33);

const first = generatePlan(emptyState(), '2026-07-23', 'policy regression', {
  now: new Date('2026-07-23T00:00:00.000Z'),
  generationId: 'policy-regression',
});
const second = generatePlan(emptyState(), '2026-07-23', 'policy regression', {
  now: new Date('2026-07-23T00:00:00.000Z'),
  generationId: 'policy-regression',
});
assert.equal(first.state.lastScheduleResult?.policy?.version, SCHEDULER_POLICY_VERSION);
assert.deepEqual(first.state.lastScheduleResult?.policy, second.state.lastScheduleResult?.policy);
assert.deepEqual(first.state.tasks, second.state.tasks, '同一policyと入力では計画結果を決定的に保つ');
console.log('✅ scheduler named policy contracts passed');
'''
          Path('scripts/scheduler-policy.test.ts').write_text(test, encoding='utf-8')

          p = Path('package.json')
          data = json.loads(p.read_text())
          command = 'vite-node scripts/scheduler-policy.test.ts'
          current = data['scripts']['test:scheduler']
          if command not in current:
            data['scripts']['test:scheduler'] = current + ' && ' + command
          p.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          rm .github/workflows/apply-scheduler-policy.yml
          npm ci
          npm run typecheck
          npm run test:scheduler
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "スケジューラ調整値を名前付きpolicyへ集約する"
          git push origin HEAD:agent/fix-scheduler-policy
