name: Apply scheduler slot fix

on:
  push:
    branches:
      - fix/scheduler-slot-allocations-20260710

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/scheduler-slot-allocations-20260710
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply focused code changes
        shell: bash
        run: |
          python - <<'PYCODE'
          from pathlib import Path
          import base64
          import json
          import zlib

          payload = json.loads(zlib.decompress(base64.b64decode("")))

          def replace_once(path: str, old: str, new: str, label: str) -> None:
              file_path = Path(path)
              text = file_path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one match, got {count}")
              file_path.write_text(text.replace(old, new, 1))

          for operation in payload["replacements"]:
              replace_once(
                  operation["path"],
                  operation["old"],
                  operation["new"],
                  operation["label"],
              )

          for operation in payload["regions"]:
              file_path = Path(operation["path"])
              text = file_path.read_text()
              start = text.find(operation["start"])
              end = text.find(operation["end"], start + len(operation["start"]))
              if start < 0 or end < 0 or end <= start:
                  raise SystemExit(f"region markers not found in {operation['path']}")
              file_path.write_text(text[:start] + operation["content"] + text[end:])

          for operation in payload["insertions"]:
              replace_once(
                  operation["path"],
                  operation["marker"],
                  operation["content"] + operation["marker"],
                  f"insertion in {operation['path']}",
              )

          for operation in payload["global_replacements"]:
              file_path = Path(operation["path"])
              text = file_path.read_text()
              count = text.count(operation["old"])
              if count < 1:
                  raise SystemExit(f"global replacement not found in {operation['path']}")
              file_path.write_text(text.replace(operation["old"], operation["new"]))
          PYCODE

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Commit verified changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-scheduler-fix.yml
          git add package.json src/lib/strictSolver.ts src/lib/schedulerV2.ts src/lib/storage.ts src/lib/scheduler.ts src/state/AppContext.tsx scripts/schedulerV2.test.ts
          git commit -m "Verify scheduler slot allocation fix"
          git push origin HEAD:fix/scheduler-slot-allocations-20260710
