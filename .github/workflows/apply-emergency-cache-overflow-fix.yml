name: Apply emergency cache overflow fix

on:
  push:
    branches:
      - agent/fix-emergency-cache-overflow

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-emergency-cache-overflow
          fetch-depth: 0

      - name: Apply source and regression changes
        run: node scripts/apply-emergency-cache-overflow-fix.mjs

      - name: Commit generated fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: treat oversized emergency cache as normal IndexedDB fallback"
          git push origin HEAD:agent/fix-emergency-cache-overflow
