name: Apply issue 567 fix

on:
  push:
    branches:
      - fix/issue-567-memory-restore-owner-guard

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-567-memory-restore-owner-guard
      - name: Apply focused restore guard and tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          restore = Path('src/features/memory/ui/MemoryBackupRestore.tsx')
          source = restore.read_text()
          old = """        } catch (caught) {
          // Do not block restoration when the server cannot be checked. Every
          // unconfirmed attempt is intentionally re-sent through normal sync.
          console.warn('暗記バックアップの回答receipt確認に失敗したため安全側で再送します', caught);
          break;
        }
"""
          new = """        } catch (caught) {
          if (!isCurrentAction()) return;
          // Do not block restoration when the server cannot be checked. Every
          // unconfirmed attempt is intentionally re-sent through normal sync.
          console.warn('暗記バックアップの回答receipt確認に失敗したため安全側で再送します', caught);
          break;
        }
"""
          if old not in source:
              raise SystemExit('receipt catch block not found')
          source = source.replace(old, new, 1)
          marker = """      await actionRepository.replaceFromBackup({
"""
          replacement = """      if (!isCurrentAction()) return;
      await actionRepository.replaceFromBackup({
"""
          if marker not in source:
              raise SystemExit('replaceFromBackup marker not found')
          source = source.replace(marker, replacement, 1)
          restore.write_text(source)

          test = Path('scripts/memory-resilience-contract.test.mjs')
          source = test.read_text()
          source = source.replace(
              "const [resultSource, detailSource, homeSource, setupSource, studySource, contextSource, materialsSource, conflictsSource] = await Promise.all([",
              "const [resultSource, detailSource, homeSource, setupSource, studySource, contextSource, materialsSource, conflictsSource, backupRestoreSource] = await Promise.all([",
              1,
          )
          source = source.replace(
              "  readFile(new URL('../src/features/memory/ui/MemoryConflictsDialog.tsx', import.meta.url), 'utf8'),\n]);",
              "  readFile(new URL('../src/features/memory/ui/MemoryConflictsDialog.tsx', import.meta.url), 'utf8'),\n  readFile(new URL('../src/features/memory/ui/MemoryBackupRestore.tsx', import.meta.url), 'utf8'),\n]);",
              1,
          )
          insertion = """
assert.match(
  backupRestoreSource,
  /catch \(caught\) \{\n\s+if \(!isCurrentAction\(\)\) return;[\s\S]*?安全側で再送します/,
  'receipt確認失敗時も旧repositoryの復元操作を即時中止する',
);
assert.match(
  backupRestoreSource,
  /if \(!isCurrentAction\(\)\) return;\n\s+await actionRepository\.replaceFromBackup/,
  '破壊的な完全置換の直前にrepositoryとtokenを再確認する',
);
assert.match(
  backupRestoreSource,
  /catch \(caught\) \{\n\s+if \(!isCurrentAction\(\)\) return;[\s\S]*?console\.warn[\s\S]*?break;/,
  '同一ownerのreceipt失敗では安全側再送として復元を継続する',
);
"""
          anchor = "\nassert.match(materialsSource, /class MemoryFeatureBoundary extends Component/"
          if anchor not in source:
              raise SystemExit('test insertion anchor not found')
          source = source.replace(anchor, insertion + anchor, 1)
          test.write_text(source)
          PY
          git diff --check
          git rm .github/workflows/apply-issue-567.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/features/memory/ui/MemoryBackupRestore.tsx scripts/memory-resilience-contract.test.mjs
          git commit -m "fix: stop stale memory backup restores"
          git push origin HEAD:fix/issue-567-memory-restore-owner-guard
