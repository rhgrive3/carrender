name: Apply issue 389 patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/issue-389-memory-cursor-pagination'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply verified local patch
        shell: bash
        run: |
          echo '' | base64 -d | gunzip > /tmp/issue-389.patch
          git apply --index /tmp/issue-389.patch
          rm .github/workflows/apply-issue-389.yml
          mkdir -p .automation
          printf 'delete this file to trigger final CI\n' > .automation/issue-389-ci-trigger
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'perf: paginate memory IndexedDB reads'
          git push origin HEAD:${{ github.head_ref }}
