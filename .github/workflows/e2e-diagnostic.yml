name: E2E diagnostic

on:
  push:
    branches:
      - agent/mandatory-entity-merge-20260714
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Capture E2E
        run: |
          set +e
          npm run test:e2e > e2e.log 2>&1
          status=$?
          cat e2e.log
          echo "$status" > e2e.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostic
          path: |
            e2e.log
            e2e.status
