name: Temporary AI preview fix

on:
  push:
    branches:
      - fix/memory-ai-preview-race

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/memory-ai-preview-race
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply focused fix and tests
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('src/features/memory/ui/MemoryImportExport.tsx')
          source = path.read_text()

          replacements = [
            (
              "  const [exporting, setExporting] = useState(false);\n  const [aiText, setAiText] = useState('');",
              "  const [exporting, setExporting] = useState(false);\n  const [aiInspecting, setAiInspecting] = useState(false);\n  const [aiText, setAiText] = useState('');",
            ),
            (
              "  const fileReadGenerationRef = useRef<Record<TextFileTarget, number>>({ import: 0, ai: 0 });\n  const repositoryRef = useRef(repository);",
              "  const fileReadGenerationRef = useRef<Record<TextFileTarget, number>>({ import: 0, ai: 0 });\n  const aiInspectGenerationRef = useRef(0);\n  const repositoryRef = useRef(repository);",
            ),
            (
              "  const busy = saving || exporting;",
              "  const busy = saving || exporting || aiInspecting;",
            ),
            (
              "      fileReadGenerationRef.current.ai += 1;\n    };",
              "      fileReadGenerationRef.current.ai += 1;\n      aiInspectGenerationRef.current += 1;\n    };",
            ),
            (
              "  const invalidateTextFileRead = (target: TextFileTarget): void => {\n    fileReadGenerationRef.current[target] += 1;\n  };",
              "  const invalidateTextFileRead = (target: TextFileTarget): void => {\n    fileReadGenerationRef.current[target] += 1;\n  };\n\n  const invalidateAiInspection = (): void => {\n    aiInspectGenerationRef.current += 1;\n    setAiInspecting(false);\n    setAiPreview(undefined);\n    setAiSelected(new Set());\n  };",
            ),
            (
              "      if (target === 'ai') { setAiText(value); setAiPreview(undefined); }\n      else setText(value);",
              "      if (target === 'ai') { invalidateAiInspection(); setAiText(value); }\n      else setText(value);",
            ),
            (
              "  const inspectAi = async () => {\n    if (!repository || busy) return;\n    const preview = previewAiImport(aiText, await repository.loadContent());\n    if (!mountedRef.current) return;\n    setAiPreview(preview);\n    setAiSelected(new Set(preview.entries.filter((entry) => entry.kind === 'new').map((entry) => entry.key)));\n  };",
              "  const inspectAi = async () => {\n    if (!repository || busy || !aiText.trim()) return;\n    const actionRepository = repository;\n    const actionText = aiText;\n    const generation = aiInspectGenerationRef.current + 1;\n    aiInspectGenerationRef.current = generation;\n    setAiInspecting(true);\n    setAiPreview(undefined);\n    setAiSelected(new Set());\n    try {\n      const content = await actionRepository.loadContent();\n      if (!isCurrentRepository(actionRepository) || aiInspectGenerationRef.current !== generation) return;\n      const preview = previewAiImport(actionText, content);\n      setAiPreview(preview);\n      setAiSelected(new Set(preview.entries.filter((entry) => entry.kind === 'new').map((entry) => entry.key)));\n    } catch (caught) {\n      if (isCurrentRepository(actionRepository) && aiInspectGenerationRef.current === generation) {\n        toast(caught instanceof Error ? caught.message : 'AI差分を確認できませんでした');\n      }\n    } finally {\n      if (mountedRef.current && aiInspectGenerationRef.current === generation) setAiInspecting(false);\n    }\n  };",
            ),
            (
              "          <fieldset disabled={saving} className=\"memory-import-input-group\">",
              "          <fieldset disabled={saving || aiInspecting} className=\"memory-import-input-group\" aria-busy={saving || aiInspecting}>",
            ),
            (
              "<textarea id=\"memory-ai-json\" className=\"memory-import-textarea\" value={aiText} onChange={(event) => { invalidateTextFileRead('ai'); setAiText(event.target.value); setAiPreview(undefined); }} />",
              "<textarea id=\"memory-ai-json\" className=\"memory-import-textarea\" value={aiText} onChange={(event) => { invalidateTextFileRead('ai'); invalidateAiInspection(); setAiText(event.target.value); }} />",
            ),
            (
              "<button type=\"button\" className=\"btn btn-primary\" disabled={!aiText.trim()} onClick={() => void inspectAi()}>差分を確認</button>",
              "<button type=\"button\" className=\"btn btn-primary\" aria-busy={aiInspecting} disabled={aiInspecting || !aiText.trim()} onClick={() => void inspectAi()}>{aiInspecting ? '確認中…' : '差分を確認'}</button>",
            ),
          ]

          for old, new in replacements:
            count = source.count(old)
            if count != 1:
              raise SystemExit(f'replacement target count={count}: {old[:80]!r}')
            source = source.replace(old, new)

          path.write_text(source)

          test_path = Path('scripts/memory-import-save-resilience.test.mjs')
          test = test_path.read_text()
          marker = "assert.match(source, /fileReadGenerationRef\\.current\\.import \\+= 1;[\\s\\S]*fileReadGenerationRef\\.current\\.ai \\+= 1/u, '画面離脱時に進行中のファイル読込を無効化する');\n"
          addition = marker + "assert.match(source, /const aiInspectGenerationRef = useRef\\(0\\)/u, 'AI差分確認は操作世代を持つ');\nassert.match(source, /const actionText = aiText;[\\s\\S]*aiInspectGenerationRef\\.current !== generation/u, '古いAI差分確認結果を現在入力へ反映しない');\nassert.match(source, /invalidateAiInspection\\(\\); setAiText/u, 'AI差分の入力変更時に進行中の確認を無効化する');\nassert.match(source, /fieldset disabled=\\{saving \\|\\| aiInspecting\\}[\\s\\S]*aria-busy=\\{saving \\|\\| aiInspecting\\}/u, 'AI差分確認中は入力を固定して処理中状態を伝える');\nassert.match(source, /aria-busy=\\{aiInspecting\\}[\\s\\S]*確認中…/u, 'AI差分確認ボタンへ進行状態を表示する');\n"
          if test.count(marker) != 1:
            raise SystemExit('test insertion marker not found exactly once')
          test_path.write_text(test.replace(marker, addition))
          PY
          rm .github/workflows/temporary-ai-preview-fix.yml
          npm ci
          node scripts/memory-import-save-resilience.test.mjs
          npm run typecheck
          npm run lint
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/memory/ui/MemoryImportExport.tsx scripts/memory-import-save-resilience.test.mjs .github/workflows/temporary-ai-preview-fix.yml
          git commit -m "暗記AI差分の古い確認結果を反映しない"
          git push origin HEAD:fix/memory-ai-preview-race
