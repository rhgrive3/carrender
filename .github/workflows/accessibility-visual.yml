name: Accessibility visual audit

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/accessibility-visual-browser.mjs'
      - '.github/workflows/accessibility-visual.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'wrangler.toml'
      - 'schema/**'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/accessibility-visual-browser.mjs'
      - '.github/workflows/accessibility-visual.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'wrangler.toml'
      - 'schema/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Production build
        run: npm run build
      - name: Run actual DOM and visual accessibility audit
        run: node scripts/accessibility-visual-browser.mjs
      - name: Upload reviewable screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-visual-screenshots
          path: artifacts/accessibility-visual
          if-no-files-found: error
          retention-days: 14
