name: Fix issue 389 types

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'fix/issue-389-memory-cursor-pagination'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('src/features/memory/infrastructure/repositories.ts')
          s = p.read_text().replace('rows.at(-1)', 'rows[rows.length - 1]')
          p.write_text(s)
          PY
          rm .github/workflows/debug-issue-389.yml .github/workflows/fix-issue-389-types.yml
          mkdir -p .automation
          printf 'delete to run final CI\n' > .automation/issue-389-final-trigger
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: support configured TypeScript target'
          git push origin HEAD:${{ github.head_ref }}
