name: Revert scheduler slot fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  revert-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out revert branch
        uses: actions/checkout@v4
        with:
          ref: revert/scheduler-slot-fix-20260710
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Revert scheduler change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git revert --no-commit 77edd7b81ff793b93bce4b350f561c7425833d8d

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Commit verified revert
        shell: bash
        run: |
          git rm .github/workflows/revert-scheduler-fix.yml
          git add -A
          git commit -m "Revert scheduler slot allocation changes"
          git push origin HEAD:revert/scheduler-slot-fix-20260710
