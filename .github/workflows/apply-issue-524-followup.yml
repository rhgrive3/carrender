name: Apply issue 524 route identity follow-up

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'fix/issue-524-route-bound-item-identity'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply route-bound identity fix and tests
        shell: bash
        run: |
          echo '' | base64 -d | python3 -c 'import sys,zlib;sys.stdout.buffer.write(zlib.decompress(sys.stdin.buffer.read()))' > /tmp/apply.py
          python3 /tmp/apply.py
          npm ci
          npm run typecheck
          npm run test:unit
          node scripts/memory-editor-save-resilience.test.mjs
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: bind memory edits to route item identity"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
