name: Audit review branch fix

on:
  push:
    branches:
      - fix/audit-issues-344-352

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[audit-review-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/audit-issues-344-352
          fetch-depth: 0
      - name: Apply reviewed fixes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          def must_replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'missing replacement in {path}: {old[:100]!r}')
              file.write_text(text.replace(old, new, 1))

          records = Path('src/screens/RecordsScreen.tsx')
          text = records.read_text()
          if "recordChartSharePercent" not in text:
              text = text.replace(
                  "import { stablePlanTasks } from '../lib/progressChart';\n",
                  "import { stablePlanTasks } from '../lib/progressChart';\nimport { recordChartSharePercent } from '../lib/recordChartShares';\n",
                  1,
              )
          old_height = "height: `${Math.max(8, (minutes / Math.max(1, actual)) * 100)}%`,"
          if old_height not in text:
              raise SystemExit('record chart inflated height not found')
          text = text.replace(old_height, "height: `${recordChartSharePercent(minutes, actual)}%`,", 1)
          records.write_text(text)

          Path('src/lib/recordChartShares.ts').write_text("""export function recordChartSharePercent(minutes: number, totalMinutes: number): number {
            const value = Number.isFinite(minutes) ? Math.max(0, minutes) : 0;
            const total = Number.isFinite(totalMinutes) ? Math.max(0, totalMinutes) : 0;
            if (total <= 0 || value <= 0) return 0;
            return Math.min(100, (value / total) * 100);
          }
          """)

          main = Path('src/main.tsx')
          text = main.read_text()
          text = text.replace("import { installRecordChartNormalization } from './lib/recordChartNormalization';\n", '')
          text = text.replace('installRecordChartNormalization();\n', '')
          main.write_text(text)
          Path('src/lib/recordChartNormalization.ts').unlink(missing_ok=True)

          setup = Path('src/features/memory/ui/MemoryStudySetup.tsx')
          text = setup.read_text()
          text, count = re.subn(
              r"\n    if \(activeSession && !window\.confirm\([\s\S]*?\)\) return;\n    const actionRepository = repository;",
              "\n    const actionRepository = repository;",
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('active-session pre-confirm block not found')
          marker = "    try {\n      const config: MemorySessionConfig = {"
          replacement = """    try {
              const activeBeforeConfirm = await actionRepository.getActiveSession();
              if (activeBeforeConfirm && !window.confirm(
                `前回の暗記学習（回答${activeBeforeConfirm.answerCount}回）が途中です。\\n前回を終了して新しい学習を始めますか？`,
              )) return;
              if (!isCurrentAction()) return;
              const activeBeforeCreate = await actionRepository.getActiveSession();
              if ((activeBeforeCreate?.id ?? null) !== (activeBeforeConfirm?.id ?? null)) {
                throw new Error('途中の暗記学習が別の操作で変更されました。内容を確認してもう一度始めてください');
              }
              const config: MemorySessionConfig = {"""
          if marker not in text:
              raise SystemExit('study setup try marker not found')
          setup.write_text(text.replace(marker, replacement, 1))

          package = Path('package.json')
          text = package.read_text()
          if 'audit-issues-344-352.behavior.test.ts' not in text:
              text = text.replace(
                  'node scripts/audit-issues-344-352.test.mjs && node scripts/pages-build-gate.test.mjs',
                  'node scripts/audit-issues-344-352.test.mjs && vite-node scripts/audit-issues-344-352.behavior.test.ts && node scripts/pages-build-gate.test.mjs',
                  1,
              )
          package.write_text(text)

          Path('scripts/audit-issues-344-352.behavior.test.ts').write_text("""import assert from 'node:assert/strict';
          import { recordChartSharePercent } from '../src/lib/recordChartShares';
          import { summarizeMemoryCardOutcomes } from '../src/features/memory/ui/MemoryResult';
          import { appReducer, emptyState } from '../src/state/AppContext';
          import { addDays, today } from '../src/lib/date';

          const shares = (values: number[]) => {
            const total = values.reduce((sum, value) => sum + value, 0);
            return values.map((value) => recordChartSharePercent(value, total));
          };
          for (const values of [[95, 5], [98, 1, 1], [1, 1, 1], [100]]) {
            const result = shares(values);
            assert.ok(Math.abs(result.reduce((sum, value) => sum + value, 0) - 100) < 1e-9);
            result.forEach((value) => assert.ok(value >= 0 && value <= 100));
          }
          assert.deepEqual(shares([95, 5]), [95, 5]);
          assert.equal(recordChartSharePercent(Number.NaN, 100), 0);
          assert.equal(recordChartSharePercent(10, 0), 0);

          const outcomes = summarizeMemoryCardOutcomes({
            initialTargetIds: ['a', 'a', 'b', 'c'], completedTargetIds: ['a'], needsReviewTargetIds: ['b'],
          } as any, [
            { targetId: 'a', assessment: 'incorrect' }, { targetId: 'a', assessment: 'correct' },
            { targetId: 'b', assessment: 'partial' }, { targetId: 'c', assessment: 'incorrect' },
          ] as any);
          assert.deepEqual(outcomes, { remembered: 1, unsure: 1, missed: 1 });

          const t = today();
          const now = new Date().toISOString();
          const base = emptyState();
          const material: any = {
            id: 'material', subjectId: 'subject', name: '教材', unit: '問題', totalAmount: 300,
            totalUnits: 300, doneAmount: 0, completedRanges: [], startDate: t, targetDate: addDays(t, 30),
            priority: 3, difficulty: 3, minutesPerUnit: 10, estimatedMinutesPerUnit: 20, unitStep: 1,
            splittable: true, minimumChunkUnits: 1, preferredCadence: { type: 'auto' }, estimateMode: 'auto',
            dailyTarget: null, weeklyTarget: null, deadlinePolicy: 'normal', examRelevance: 3,
            reviewEnabled: false, reviewIntervals: [1, 3, 7], paused: false, round: 1, archived: false, createdAt: now,
          };
          const makeSession = (id: string): any => ({
            id, taskId: null, subjectId: 'subject', materialId: 'material', date: t,
            startedAt: `${t}T00:00:00.000Z`, minutes: 20, amountDone: 1, rangeLabel: '1',
            focus: 3, memo: '', source: 'manual', completedTask: false, progressRangesAdded: [], updatedAt: now,
          });
          const state: any = {
            ...base, onboarded: true,
            subjects: [{ id: 'subject', name: '数学', color: '#4f7cff', importance: 3, weakness: 3 }],
            materials: [material], sessions: [makeSession('s1'), makeSession('s2'), makeSession('s3')],
            settings: { ...base.settings, estimateAlpha: 0.2 },
          };
          const edited = appReducer(state, {
            type: 'UPDATE_SESSION', sessionId: 's1', input: {
              taskId: null, subjectId: 'subject', materialId: 'material', minutes: 20, amountDone: 1,
              focus: 3, memo: 'memo only', source: 'manual', rangeLabel: '1', completedTask: false,
              date: t, startTime: '09:00',
            },
          });
          assert.equal(edited.materials[0].minutesPerUnit, 10);
          assert.equal(edited.materials[0].estimatedMinutesPerUnit, 20);

          const rangedState: any = {
            ...state, sessions: [],
            materials: [{ ...material, doneAmount: 100, completedRanges: [{ start: 1, end: 50 }, { start: 251, end: 300 }] }],
          };
          const shrunk = appReducer(rangedState, {
            type: 'UPDATE_MATERIAL',
            material: { ...rangedState.materials[0], totalAmount: 200, totalUnits: 200, doneAmount: 50, completedRanges: [{ start: 1, end: 50 }] },
          });
          assert.deepEqual(shrunk.materials[0].completedRanges, [{ start: 1, end: 50 }]);
          assert.equal(shrunk.materials[0].doneAmount, 50);

          const invalid = appReducer(state, {
            type: 'UPDATE_MATERIAL', material: { ...material, preferredCadence: { type: 'timesPerWeek', count: 8 } },
          });
          assert.equal(invalid, state);
          console.log('audit issues #344-#352 behavior regressions passed');
          """)

          audit = Path('scripts/audit-issues-344-352.test.mjs')
          text = audit.read_text()
          text = text.replace("const chart = read('src/lib/recordChartNormalization.ts');\nconst main = read('src/main.tsx');\n", "const records = read('src/screens/RecordsScreen.tsx');\nconst shares = read('src/lib/recordChartShares.ts');\n")
          text = re.sub(
              r"assert\.match\(chart,[\s\S]*?assert\.match\(main, /installRecordChartNormalization\\\(\\\)/, 'record chart normalization must run in production'\);",
              "assert.match(records, /recordChartSharePercent\\(minutes, actual\\)/, 'React must render chart shares from numeric source data');\nassert.doesNotMatch(records, /Math\\.max\\(8,/, 'small categories must not inflate stacked percentages');\nassert.match(shares, /value \\/ total/, 'chart helper must calculate exact proportions');\nassert.doesNotMatch(records, /minutesFromTitle|MutationObserver/, 'chart rendering must not parse localized DOM text');",
              text,
              count=1,
          )
          audit.write_text(text)

          for path in ['scripts/memory-simple-ux.test.mjs', 'scripts/memory-study-setup-start-race.test.mjs']:
              file = Path(path)
              text = file.read_text()
              if 'activeBeforeConfirm = await actionRepository.getActiveSession()' not in text:
                  insert = "assert.match(source, /activeBeforeConfirm = await actionRepository\\.getActiveSession\\(\\)/u, '開始前に最新active sessionを確認する');\nassert.match(source, /activeBeforeCreate = await actionRepository\\.getActiveSession\\(\\)[\\s\\S]*activeBeforeCreate\\?\\.id[\\s\\S]*activeBeforeConfirm\\?\\.id/u, '確認中のactive session変更を検出する');\n" if 'const source =' in text else "assert.match(setup, /activeBeforeConfirm = await actionRepository\\.getActiveSession\\(\\)/u, '開始前に最新active sessionを確認する');\nassert.match(setup, /activeBeforeCreate = await actionRepository\\.getActiveSession\\(\\)[\\s\\S]*activeBeforeCreate\\?\\.id[\\s\\S]*activeBeforeConfirm\\?\\.id/u, '確認中のactive session変更を検出する');\n"
                  marker = "console.log("
                  text = text.replace(marker, insert + "\n" + marker, 1)
                  file.write_text(text)

          Path('.github/workflows/apply-audit-review-fixes.yml').unlink(missing_ok=True)
          Path('.github/workflows/audit-review-branch-fix.yml').unlink(missing_ok=True)
          PY
      - name: Commit reviewed fixes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: apply final audit review [audit-review-applied]"
          git push origin HEAD:fix/audit-issues-344-352
