name: Apply unsaved-input UX fixes

on:
  push:
    branches:
      - fix/ux-unsaved-navigation-20260721

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Apply reviewed patches
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'expected snippet not found in {path}: {old[:120]!r}')
              file.write_text(text.replace(old, new, 1))

          replace(
              'src/features/memory/ui/MemoryContext.tsx',
              "const MemoryContext = createContext<MemoryContextValue | null>(null);\n\nexport function MemoryProvider",
              """const MemoryContext = createContext<MemoryContextValue | null>(null);
const MEMORY_EDITOR_SELECTOR = '.memory-editor, .memory-bulk-editor';

function shouldConfirmExternalMemoryNavigation(): boolean {
  if (typeof window === 'undefined' || typeof document === 'undefined') return false;
  if (!document.querySelector(MEMORY_EDITOR_SELECTOR)) return false;
  const activeElement = document.activeElement;
  if (activeElement instanceof Element && activeElement.closest(MEMORY_EDITOR_SELECTOR)) return false;
  const event = new Event('beforeunload', { cancelable: true });
  window.dispatchEvent(event);
  return event.defaultPrevented;
}

export function MemoryProvider""",
          )
          replace(
              'src/features/memory/ui/MemoryContext.tsx',
              "  const navigate = useCallback((next: MemoryView) => setView(next), []);",
              """  const navigate = useCallback((next: MemoryView) => {
    if (shouldConfirmExternalMemoryNavigation()
      && !window.confirm('未保存の暗記カード入力を破棄して移動しますか？')) return;
    setView(next);
  }, []);""",
          )

          replace(
              'src/components/ui/Sheet.tsx',
              "  className?: string;\n  children: ReactNode;",
              """  className?: string;
  protectUnsavedChanges?: boolean;
  unsavedChangesMessage?: string;
  children: ReactNode;""",
          )
          replace(
              'src/components/ui/Sheet.tsx',
              "/** モバイル向けボトムシート */\nexport function Sheet({ open, onClose, title, subtitle, onBack, backLabel = '前の画面へ戻る', className, children }: SheetProps) {",
              """function sheetControlSnapshot(root: HTMLElement): string {
  return JSON.stringify([...root.querySelectorAll<HTMLElement>('input, select, textarea, [role="radio"], output')].map((element, index) => {
    const key = element.id || element.getAttribute('aria-label') || String(index);
    if (element instanceof HTMLInputElement) return ['input', key, element.type, element.value, element.checked];
    if (element instanceof HTMLSelectElement) return ['select', key, element.value];
    if (element instanceof HTMLTextAreaElement) return ['textarea', key, element.value];
    if (element.getAttribute('role') === 'radio') return ['radio', key, element.getAttribute('aria-checked')];
    return ['output', key, element.textContent?.trim() ?? ''];
  }));
}

/** モバイル向けボトムシート */
export function Sheet({
  open,
  onClose,
  title,
  subtitle,
  onBack,
  backLabel = '前の画面へ戻る',
  className,
  protectUnsavedChanges = false,
  unsavedChangesMessage = '保存されていない入力を破棄して閉じますか？',
  children,
}: SheetProps) {""",
          )
          replace(
              'src/components/ui/Sheet.tsx',
              "  const onCloseRef = useRef(onClose);\n  onCloseRef.current = onClose;\n  const backdropPointerRef",
              """  const initialControlSnapshotRef = useRef<string | null>(null);
  const hasUnsavedChanges = () => {
    const sheet = sheetRef.current;
    const initial = initialControlSnapshotRef.current;
    return Boolean(protectUnsavedChanges && sheet && initial !== null && sheetControlSnapshot(sheet) !== initial);
  };
  const requestClose = () => {
    if (hasUnsavedChanges() && !window.confirm(unsavedChangesMessage)) return;
    onClose();
  };
  const onCloseRef = useRef(requestClose);
  onCloseRef.current = requestClose;
  const backdropPointerRef""",
          )
          replace(
              'src/components/ui/Sheet.tsx',
              """  useEffect(() => {
    if (!open || !backdropRef.current) return;
    const restoreModalIsolation = acquireModalIsolation(backdropRef.current);""",
              """  useEffect(() => {
    if (!open || !backdropRef.current) {
      initialControlSnapshotRef.current = null;
      return;
    }
    const restoreModalIsolation = acquireModalIsolation(backdropRef.current);""",
          )
          replace(
              'src/components/ui/Sheet.tsx',
              """    const frame = window.requestAnimationFrame(() => {
      const sheet = sheetRef.current;
      if (!sheet) return;
      getInitialFocusTarget(sheet).focus();
    });
    const onKey = (e: KeyboardEvent) => {""",
              """    const frame = window.requestAnimationFrame(() => {
      const sheet = sheetRef.current;
      if (!sheet) return;
      getInitialFocusTarget(sheet).focus();
    });
    let snapshotFrame = 0;
    const baselineFrame = window.requestAnimationFrame(() => {
      snapshotFrame = window.requestAnimationFrame(() => {
        initialControlSnapshotRef.current = sheetRef.current ? sheetControlSnapshot(sheetRef.current) : null;
      });
    });
    const onBeforeUnload = (event: BeforeUnloadEvent) => {
      if (!hasUnsavedChanges()) return;
      event.preventDefault();
      event.returnValue = '';
    };
    const onKey = (e: KeyboardEvent) => {""",
          )
          replace(
              'src/components/ui/Sheet.tsx',
              """    window.addEventListener('keydown', onKey);
    return () => {
      window.cancelAnimationFrame(frame);
      window.removeEventListener('keydown', onKey);""",
              """    window.addEventListener('keydown', onKey);
    window.addEventListener('beforeunload', onBeforeUnload);
    return () => {
      window.cancelAnimationFrame(frame);
      window.cancelAnimationFrame(baselineFrame);
      if (snapshotFrame) window.cancelAnimationFrame(snapshotFrame);
      window.removeEventListener('keydown', onKey);
      window.removeEventListener('beforeunload', onBeforeUnload);
      initialControlSnapshotRef.current = null;""",
          )
          replace(
              'src/components/ui/Sheet.tsx',
              "  }, [open]);",
              "  }, [open, protectUnsavedChanges]);",
          )
          replace(
              'src/components/ui/Sheet.tsx',
              "        if (moved <= 10) onClose();",
              "        if (moved <= 10) requestClose();",
          )
          replace(
              'src/components/ui/Sheet.tsx',
              "          <button className=\"sheet-close\" type=\"button\" aria-label={`${dialogName}を閉じる`} onClick={onClose}>",
              "          <button className=\"sheet-close\" type=\"button\" aria-label={`${dialogName}を閉じる`} onClick={requestClose}>",
          )

          replace(
              'src/components/forms/RecordSheet.tsx',
              "    <Sheet open={open} onClose={onClose} title={session ? '学習記録を編集' : preset?.source === 'timer' ? 'おつかれさま!記録しよう' : '勉強を記録'}>",
              "    <Sheet open={open} onClose={onClose} protectUnsavedChanges unsavedChangesMessage=\"入力中の学習記録を破棄して閉じますか？\" title={session ? '学習記録を編集' : preset?.source === 'timer' ? 'おつかれさま!記録しよう' : '勉強を記録'}>",
          )

          replace(
              'scripts/memory-editor-unsaved-navigation.test.mjs',
              "const source = await readFile(new URL('../src/features/memory/ui/MemoryEditor.tsx', import.meta.url), 'utf8');",
              """const source = await readFile(new URL('../src/features/memory/ui/MemoryEditor.tsx', import.meta.url), 'utf8');
const context = await readFile(new URL('../src/features/memory/ui/MemoryContext.tsx', import.meta.url), 'utf8');""",
          )
          replace(
              'scripts/memory-editor-unsaved-navigation.test.mjs',
              "assert.ok(source.includes('savedDraftSnapshotRef.current = JSON.stringify(nextBlank)'), '保存して次へでは空カードを新しい基準にする');",
              """assert.ok(source.includes('savedDraftSnapshotRef.current = JSON.stringify(nextBlank)'), '保存して次へでは空カードを新しい基準にする');
assert.ok(context.includes("const MEMORY_EDITOR_SELECTOR = '.memory-editor, .memory-bulk-editor'"), '外側導線からも編集中画面を識別する');
assert.ok(context.includes("new Event('beforeunload', { cancelable: true })"), '既存の未保存判定を中央ナビゲーション境界で再利用する');
assert.ok(context.includes("window.confirm('未保存の暗記カード入力を破棄して移動しますか？')"), '別タブ経由の暗記遷移でも破棄確認する');
assert.ok(context.includes('activeElement.closest(MEMORY_EDITOR_SELECTOR)'), '編集画面内の既存確認と二重に確認しない');""",
          )

          replace(
              'scripts/record-sheet-state-reset.test.ts',
              "const source = readFileSync(new URL('../src/components/forms/RecordSheet.tsx', import.meta.url), 'utf8');",
              """const source = readFileSync(new URL('../src/components/forms/RecordSheet.tsx', import.meta.url), 'utf8');
const sheet = readFileSync(new URL('../src/components/ui/Sheet.tsx', import.meta.url), 'utf8');""",
          )
          replace(
              'scripts/record-sheet-state-reset.test.ts',
              "assert.equal(source.includes('applyRecordSessionTransaction'), true);",
              """assert.equal(source.includes('applyRecordSessionTransaction'), true);
assert.equal(source.includes('protectUnsavedChanges'), true);
assert.equal(sheet.includes('function sheetControlSnapshot'), true);
assert.equal(sheet.includes("window.addEventListener('beforeunload', onBeforeUnload)"), true);
assert.equal(sheet.includes('onClick={requestClose}'), true);""",
          )
          PY

          rm .github/workflows/automated-ux-fix.yml

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Targeted regression tests
        run: |
          node scripts/memory-editor-unsaved-navigation.test.mjs
          npx vite-node scripts/record-sheet-state-reset.test.ts

      - name: Full test suite
        run: npm test

      - name: Production build
        run: npm run build

      - name: Commit tested changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src scripts .github/workflows/automated-ux-fix.yml
          git commit -m "未保存入力の外部離脱を保護する"
          git push origin HEAD:${GITHUB_REF_NAME}
