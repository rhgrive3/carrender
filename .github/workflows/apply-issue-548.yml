name: Apply issue 548 patch
on:
  pull_request:
    branches:
      - main
jobs:
  apply:
    if: github.head_ref == 'fix/issue-548-import-final-snapshot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-548-import-final-snapshot
      - name: Apply patch
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('src/screens/SettingsSheet.tsx')
          s=p.read_text()
          s=s.replace("import { useApp } from '../state/AppContext';", "import { useApp } from '../state/AppContext';\nimport { prepareImportedState } from '../state/AppContextBase';")
          s=s.replace("        const imported = importJSON(String(reader.result));\n        dispatch({ type: 'IMPORT_STATE', state: imported });\n        saveStateNow(imported);", "        const imported = importJSON(String(reader.result));\n        const appliedState = prepareImportedState(imported);\n        dispatch({ type: 'REPLACE_STATE', state: appliedState });\n        saveStateNow(appliedState);")
          p.write_text(s)
          Path('scripts/main-local-import-application.test.ts').write_text("""import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';
          import { emptyState, prepareImportedState } from '../src/state/AppContextBase';
          import { addDays, today } from '../src/lib/date';

          const currentDate = today();
          const current = { ...emptyState(), onboarded: true, lastPlannedDate: currentDate };
          assert.deepEqual(prepareImportedState(current, currentDate), current);
          const stale = { ...current, lastPlannedDate: addDays(currentDate, -1) };
          assert.equal(prepareImportedState(stale, currentDate).lastPlannedDate, currentDate);
          const source = readFileSync('src/screens/SettingsSheet.tsx', 'utf8');
          assert.match(source, /const appliedState = prepareImportedState\\(imported\\);[\\s\\S]{0,160}dispatch\\(\\{ type: 'REPLACE_STATE', state: appliedState \\}\\);[\\s\\S]{0,100}saveStateNow\\(appliedState\\)/u);
          assert.doesNotMatch(source, /dispatch\\(\\{ type: 'IMPORT_STATE', state: imported \\}\\);[\\s\\S]{0,100}saveStateNow\\(imported\\)/u);
          console.log('local JSON import persists final snapshot: ok');
          """)
          pkg=Path('package.json')
          s=pkg.read_text()
          s=s.replace('vite-node scripts/main-cloud-state-application.test.ts &&', 'vite-node scripts/main-cloud-state-application.test.ts && vite-node scripts/main-local-import-application.test.ts &&')
          pkg.write_text(s)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/screens/SettingsSheet.tsx package.json scripts/main-local-import-application.test.ts
          git commit -m 'fix: persist final local import snapshot'
          git push origin HEAD:fix/issue-548-import-final-snapshot
