name: Apply issue 524 patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/issue-524-memory-draft-ownership'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - shell: bash
        run: |
          echo '' | base64 -d | gunzip > /tmp/issue524.patch
          git apply --index /tmp/issue524.patch
          rm .github/workflows/apply-issue-524.yml
          mkdir -p .automation
          printf 'delete to run final CI\n' > .automation/issue-524-trigger
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: validate memory draft entity ownership'
          git push origin HEAD:${{ github.head_ref }}
