name: Apply issue 569 fix

on:
  push:
    branches:
      - fix/issue-569-memory-restore-receipt-warning

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-569-memory-restore-receipt-warning
      - name: Apply focused fix and regression contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('src/features/memory/ui/MemoryBackupRestore.tsx')
          source = app.read_text()
          old = """      if (confirmedAttemptIds.size > 0 && receiptServerTime) {
        const acceptedAttemptIds = [...confirmedAttemptIds];
        await actionRepository.commitSyncResponse({
          serverTime: receiptServerTime,
          cursor: '0',
          acceptedMutationIds: [],
          acceptedAttemptIds,
          sentAttemptIds: acceptedAttemptIds,
          conflicts: [],
          changes: {},
        });
      }
      if (!isCurrentAction()) return;
"""
          new = """      let receiptCommitWarning = false;
      if (confirmedAttemptIds.size > 0 && receiptServerTime) {
        const acceptedAttemptIds = [...confirmedAttemptIds];
        try {
          await actionRepository.commitSyncResponse({
            serverTime: receiptServerTime,
            cursor: '0',
            acceptedMutationIds: [],
            acceptedAttemptIds,
            sentAttemptIds: acceptedAttemptIds,
            conflicts: [],
            changes: {},
          });
        } catch (caught) {
          if (!isCurrentAction()) return;
          receiptCommitWarning = true;
          console.warn('暗記バックアップは復元済みですが回答receiptを反映できないため同期で再確認します', caught);
        }
      }
      if (!isCurrentAction()) return;
"""
          if old not in source:
              raise SystemExit('receipt commit block not found')
          source = source.replace(old, new, 1)
          old_toast = """      const skipped = confirmedAttemptIds.size;
      toast(skipped > 0
        ? `完全バックアップを復元しました（既存の回答${skipped}件は再送を省略）`
        : '完全バックアップを復元しました');
"""
          new_toast = """      const skipped = confirmedAttemptIds.size;
      toast(receiptCommitWarning
        ? '完全バックアップを復元しました。回答履歴の同期状態を再確認しています'
        : skipped > 0
          ? `完全バックアップを復元しました（既存の回答${skipped}件は再送を省略）`
          : '完全バックアップを復元しました');
"""
          if old_toast not in source:
              raise SystemExit('restore success toast block not found')
          app.write_text(source.replace(old_toast, new_toast, 1))

          test = Path('scripts/memory-resilience-contract.test.mjs')
          source = test.read_text()
          marker = """assert.match(
  backupRestoreSource,
  /catch \\(caught\\) \\{\\n\\s+if \\(!isCurrentAction\\(\\)\\) return;[\\s\\S]*?console\\.warn[\\s\\S]*?break;/,
  '同一ownerのreceipt失敗では安全側再送として復元を継続する',
);
"""
          addition = marker + """
assert.match(
  backupRestoreSource,
  /let receiptCommitWarning = false;[\\s\\S]*?commitSyncResponse[\\s\\S]*?catch \\(caught\\) \\{[\\s\\S]*?if \\(!isCurrentAction\\(\\)\\) return;[\\s\\S]*?receiptCommitWarning = true;/,
  '全件置換後のreceipt反映失敗を復元本体の失敗と分離する',
);
assert.match(
  backupRestoreSource,
  /receiptCommitWarning[\\s\\S]*?回答履歴の同期状態を再確認しています[\\s\\S]*?requestSync\\(true\\)/,
  'receipt反映失敗でも部分成功を通知し通常同期へ進む',
);
assert.match(
  backupRestoreSource,
  /receiptCommitWarning[\\s\\S]*?skipped > 0[\\s\\S]*?既存の回答\\$\\{skipped\\}件は再送を省略/,
  'receipt反映成功時の既存回答スキップ表示を維持する',
);
"""
          if marker not in source:
              raise SystemExit('backup restore contract marker not found')
          test.write_text(source.replace(marker, addition, 1))
          PY
          git diff --check
          git rm .github/workflows/apply-issue-569.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/features/memory/ui/MemoryBackupRestore.tsx scripts/memory-resilience-contract.test.mjs
          git commit -m "fix: keep restore successful when receipt commit fails"
          git push origin HEAD:fix/issue-569-memory-restore-receipt-warning
