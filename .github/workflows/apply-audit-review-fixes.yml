name: Apply audit review fixes

on:
  push:
    branches:
      - fix/audit-issues-344-352

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[audit-review-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/audit-issues-344-352
          fetch-depth: 0
      - name: Apply reviewed fixes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'expected text not found in {path}: {old[:100]!r}')
              file.write_text(text.replace(old, new, 1))

          # Render record chart percentages from the React data itself. Do not parse
          # localized title strings or mutate React-owned DOM after rendering.
          replace(
              'src/screens/RecordsScreen.tsx',
              "import { stablePlanTasks } from '../lib/progressChart';\n",
              "import { stablePlanTasks } from '../lib/progressChart';\nimport { recordChartSharePercent } from '../lib/recordChartShares';\n",
          )
          replace(
              'src/screens/RecordsScreen.tsx',
              "height: `${Math.max(8, (minutes / Math.max(1, actual)) * 100)}%`,\n                        background: subject.color,",
              "height: `${recordChartSharePercent(minutes, actual)}%`,\n                        background: subject.color,\n                        boxShadow: minutes > 0 && recordChartSharePercent(minutes, actual) < 2\n                          ? `inset 0 0 0 1px ${subject.color}`\n                          : undefined,",
          )

          Path('src/lib/recordChartShares.ts').write_text("""export function recordChartSharePercent(minutes: number, totalMinutes: number): number {
            const value = Number.isFinite(minutes) ? Math.max(0, minutes) : 0;
            const total = Number.isFinite(totalMinutes) ? Math.max(0, totalMinutes) : 0;
            if (total <= 0 || value <= 0) return 0;
            return Math.min(100, (value / total) * 100);
          }
          """)

          replace(
              'src/main.tsx',
              "import { installRecordChartNormalization } from './lib/recordChartNormalization';\n",
              '',
          )
          replace(
              'src/main.tsx',
              "installRecordChartNormalization();\n",
              '',
          )
          Path('src/lib/recordChartNormalization.ts').unlink(missing_ok=True)

          # Re-read the active session at the mutation boundary and detect a change
          # between confirmation and creation.
          replace(
              'src/features/memory/ui/MemoryStudySetup.tsx',
              """    if (activeSession && !window.confirm(
              `前回の暗記学習（回答${activeSession.answerCount}回）が途中です。\\n前回を終了して新しい学習を始めますか？`,
            )) return;
            const actionRepository = repository;
          """,
              """    const actionRepository = repository;
          """,
          )
          replace(
              'src/features/memory/ui/MemoryStudySetup.tsx',
              """    try {
              const config: MemorySessionConfig = {
          """,
              """    try {
              const activeBeforeConfirm = await actionRepository.getActiveSession();
              if (activeBeforeConfirm && !window.confirm(
                `前回の暗記学習（回答${activeBeforeConfirm.answerCount}回）が途中です。\\n前回を終了して新しい学習を始めますか？`,
              )) return;
              if (!isCurrentAction()) return;
              const activeBeforeCreate = await actionRepository.getActiveSession();
              if ((activeBeforeCreate?.id ?? null) !== (activeBeforeConfirm?.id ?? null)) {
                throw new Error('途中の暗記学習が別の操作で変更されました。内容を確認してもう一度始めてください');
              }
              const config: MemorySessionConfig = {
          """,
          )

          # Extend tests with behavior-level checks and remove the DOM normalizer contract.
          package = Path('package.json')
          package_text = package.read_text()
          package_text = package_text.replace(
              'node scripts/audit-issues-344-352.test.mjs && node scripts/pages-build-gate.test.mjs',
              'node scripts/audit-issues-344-352.test.mjs && vite-node scripts/audit-issues-344-352.behavior.test.ts && node scripts/pages-build-gate.test.mjs',
              1,
          )
          package.write_text(package_text)

          Path('scripts/audit-issues-344-352.behavior.test.ts').write_text("""import assert from 'node:assert/strict';
          import { recordChartSharePercent } from '../src/lib/recordChartShares';
          import { summarizeMemoryCardOutcomes } from '../src/features/memory/ui/MemoryResult';
          import { appReducer, emptyState } from '../src/state/AppContext';
          import { addDays, today } from '../src/lib/date';

          const shares = (values: number[]) => values.map((value) => recordChartSharePercent(value, values.reduce((sum, item) => sum + item, 0)));
          for (const values of [[95, 5], [98, 1, 1], [1, 1, 1], [100]]) {
            const result = shares(values);
            assert.ok(Math.abs(result.reduce((sum, value) => sum + value, 0) - 100) < 1e-9, `shares must total 100: ${values}`);
            result.forEach((value) => assert.ok(value >= 0 && value <= 100));
          }
          assert.deepEqual(shares([95, 5]), [95, 5]);
          assert.equal(recordChartSharePercent(Number.NaN, 100), 0);
          assert.equal(recordChartSharePercent(10, 0), 0);

          const outcomes = summarizeMemoryCardOutcomes({
            initialTargetIds: ['a', 'a', 'b', 'c'],
            completedTargetIds: ['a'],
            needsReviewTargetIds: ['b'],
          } as any, [
            { targetId: 'a', assessment: 'incorrect' },
            { targetId: 'a', assessment: 'correct' },
            { targetId: 'b', assessment: 'partial' },
            { targetId: 'c', assessment: 'incorrect' },
          ] as any);
          assert.deepEqual(outcomes, { remembered: 1, unsure: 1, missed: 1 });
          assert.equal(outcomes.remembered + outcomes.unsure + outcomes.missed, 3);

          const t = today();
          const now = new Date().toISOString();
          const base = emptyState();
          const material: any = {
            id: 'material', subjectId: 'subject', name: '教材', unit: '問題',
            totalAmount: 300, totalUnits: 300, doneAmount: 0, completedRanges: [],
            startDate: t, targetDate: addDays(t, 30), priority: 3, difficulty: 3,
            minutesPerUnit: 10, estimatedMinutesPerUnit: 20, unitStep: 1, splittable: true,
            minimumChunkUnits: 1, preferredCadence: { type: 'auto' }, estimateMode: 'auto',
            dailyTarget: null, weeklyTarget: null, deadlinePolicy: 'normal', examRelevance: 3,
            reviewEnabled: false, reviewIntervals: [1, 3, 7], paused: false, round: 1,
            archived: false, createdAt: now,
          };
          const makeSession = (id: string, memo = ''): any => ({
            id, taskId: null, subjectId: 'subject', materialId: 'material', date: t,
            startedAt: `${t}T00:00:00.000Z`, minutes: 20, amountDone: 1,
            rangeLabel: '1', focus: 3, memo, source: 'manual', completedTask: false,
            progressRangesAdded: [], updatedAt: now,
          });
          const sessions = [makeSession('s1'), makeSession('s2'), makeSession('s3')];
          const state: any = {
            ...base,
            onboarded: true,
            subjects: [{ id: 'subject', name: '数学', color: '#4f7cff', importance: 3, weakness: 3 }],
            materials: [material],
            sessions,
            settings: { ...base.settings, estimateAlpha: 0.2 },
          };
          const edited = appReducer(state, {
            type: 'UPDATE_SESSION',
            sessionId: 's1',
            input: {
              taskId: null, subjectId: 'subject', materialId: 'material', minutes: 20,
              amountDone: 1, focus: 3, memo: 'memo only', source: 'manual', rangeLabel: '1',
              completedTask: false, date: t, startTime: '09:00',
            },
          });
          assert.equal(edited.materials[0].minutesPerUnit, 10, 'memo-only edit must not reapply smoothing');
          assert.equal(edited.materials[0].estimatedMinutesPerUnit, 20, 'memo-only edit must preserve suggested estimate');

          const rangedState: any = {
            ...state,
            sessions: [],
            materials: [{ ...material, doneAmount: 100, completedRanges: [{ start: 1, end: 50 }, { start: 251, end: 300 }] }],
          };
          const shrunk = appReducer(rangedState, {
            type: 'UPDATE_MATERIAL',
            material: { ...rangedState.materials[0], totalAmount: 200, totalUnits: 200, doneAmount: 50, completedRanges: [{ start: 1, end: 50 }] },
          });
          assert.deepEqual(shrunk.materials[0].completedRanges, [{ start: 1, end: 50 }], 'confirmed clipped ranges must not be repopulated from the beginning');
          assert.equal(shrunk.materials[0].doneAmount, 50);

          const invalidCadence = appReducer(state, {
            type: 'UPDATE_MATERIAL',
            material: { ...material, preferredCadence: { type: 'timesPerWeek', count: 8 } },
          });
          assert.equal(invalidCadence, state, 'domain boundary must reject impossible weekly cadence');

          console.log('audit issues #344-#352 behavior regressions passed');
          """)

          audit = Path('scripts/audit-issues-344-352.test.mjs')
          text = audit.read_text()
          text = text.replace("const chart = read('src/lib/recordChartNormalization.ts');\nconst main = read('src/main.tsx');\n", "const records = read('src/screens/RecordsScreen.tsx');\nconst shares = read('src/lib/recordChartShares.ts');\n")
          text = text.replace("assert.match(chart, /value \/ total/, 'chart stack heights must be exact proportions');\nassert.match(chart, /stack\\.style\\.minHeight = minHeight/, 'small categories may remain visible without inflating percentage height');\nassert.match(main, /installRecordChartNormalization\\(\\)/, 'record chart normalization must run in production');\n", "assert.match(records, /recordChartSharePercent\\(minutes, actual\\)/, 'React must render chart shares from numeric source data');\nassert.doesNotMatch(records, /Math\\.max\\(8, \\(minutes \\/ Math\\.max\\(1, actual\\)\\) \\* 100\\)/, 'small categories must not inflate stacked percentages');\nassert.match(shares, /value \\/ total/, 'chart helper must calculate exact proportions');\nassert.doesNotMatch(text, /MutationObserver|minutesFromTitle/, 'chart calculation must not parse localized DOM text or mutate React-owned DOM');\n")
          audit.write_text(text)

          memory_simple = Path('scripts/memory-simple-ux.test.mjs')
          text = memory_simple.read_text()
          marker = "assert.match(setup, /const startInFlight = useRef\\(false\\)[\\s\\S]*if \\(!repository \\|\\| startInFlight\\.current[\\s\\S]*startInFlight\\.current = true[\\s\\S]*finally \\{[\\s\\S]*startInFlight\\.current = false/u, '学習開始を同期ロックでsingle-flight化する');\n"
          addition = marker + "assert.match(setup, /const activeBeforeConfirm = await actionRepository\\.getActiveSession\\(\\)/u, '開始直前に最新の途中セッションを読み直す');\nassert.match(setup, /const activeBeforeCreate = await actionRepository\\.getActiveSession\\(\\)[\\s\\S]*activeBeforeCreate\\?\\.id[\\s\\S]*activeBeforeConfirm\\?\\.id/u, '確認中に途中セッションが変わった場合は開始を中止する');\n"
          if marker not in text:
              raise SystemExit('memory-simple start marker missing')
          memory_simple.write_text(text.replace(marker, addition, 1))

          race = Path('scripts/memory-study-setup-start-race.test.mjs')
          text = race.read_text()
          marker = "assert.match(source, /if \\(isCurrentAction\\(\\)\\) navigate/u, '離脱または所有者切替後に学習画面へ遷移しない');\n"
          addition = marker + "assert.match(source, /activeBeforeConfirm = await actionRepository\\.getActiveSession\\(\\)/u, '開始前に最新active sessionを確認する');\nassert.match(source, /activeBeforeCreate = await actionRepository\\.getActiveSession\\(\\)[\\s\\S]*activeBeforeCreate\\?\\.id[\\s\\S]*activeBeforeConfirm\\?\\.id/u, '確認中のactive session変更を検出する');\n"
          if marker not in text:
              raise SystemExit('memory setup race marker missing')
          race.write_text(text.replace(marker, addition, 1))

          Path('.github/workflows/apply-audit-review-fixes.yml').unlink(missing_ok=True)
          PY
      - name: Commit reviewed fixes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix: apply final audit review [audit-review-applied]"
          git push origin HEAD:fix/audit-issues-344-352
