name: Debug issue 389

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostics:
    if: github.head_ref == 'fix/issue-389-memory-cursor-pagination'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture typecheck
        continue-on-error: true
        shell: bash
        run: set -o pipefail; npm run typecheck 2>&1 | tee typecheck.log
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Capture cursor browser test
        continue-on-error: true
        shell: bash
        run: set -o pipefail; node scripts/memory-cursor-pagination-browser.mjs 2>&1 | tee cursor-browser.log
      - uses: actions/upload-artifact@v4
        with:
          name: issue-389-diagnostics
          path: |
            typecheck.log
            cursor-browser.log
          retention-days: 1
