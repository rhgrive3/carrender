name: Fix PR 536 type import

on:
  pull_request:
    paths:
      - '.github/workflows/debug-pr536-typecheck.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issues-395-400-deferred-planning
      - name: Add missing import
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/state/AppContextBase.tsx')
          text = path.read_text()
          old = "import { prepareSessionMutation, type SessionInput, type SessionMutationAction } from '../lib/sessionMutation';"
          new = "import { adjustCompletedRanges, prepareSessionMutation, type SessionInput, type SessionMutationAction } from '../lib/sessionMutation';"
          if old not in text:
              raise SystemExit('target import not found')
          path.write_text(text.replace(old, new))
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/state/AppContextBase.tsx
          git commit -m 'fix: import material range helper'
          git push
