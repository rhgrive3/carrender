name: Debug PR 536 typecheck

on:
  pull_request:
    paths:
      - '.github/workflows/debug-pr536-typecheck.yml'

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture typecheck
        run: npm run typecheck > typecheck.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: pr536-typecheck
          path: typecheck.log
          retention-days: 1
