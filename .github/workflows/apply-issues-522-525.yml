name: Apply issues 522 and 525 patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/issues-522-525-backup-reliability'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - shell: bash
        run: |
          echo '' | base64 -d | gunzip > /tmp/issues.patch
          git apply --index /tmp/issues.patch
          rm .github/workflows/apply-issues-522-525.yml
          mkdir -p .automation
          printf 'delete to run final CI\n' > .automation/issues-522-525-trigger
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: make full backups self-compatible and cloud-restorable'
          git push origin HEAD:${{ github.head_ref }}
