name: Apply issue 403

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/issue-403-scheduler-diagnostics' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-403-scheduler-diagnostics
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply and verify
        run: |
          python3 .github/apply_issue_403.py
          npm ci
          npm run typecheck
          npm run test:scheduler
          rm -f .github/apply_issue_403.py .github/workflows/apply-issue-403.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "スケジューラ診断へ緩和試行と未配置分類を記録する"
          git push origin HEAD:agent/issue-403-scheduler-diagnostics
