name: Refresh dependency lock

on:
  push:
    branches:
      - agent/full-code-review-20260714

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-code-review-20260714
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --package-lock-only --ignore-scripts
      - name: Commit regenerated lockfile
        run: |
          if git diff --quiet -- package-lock.json; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package-lock.json
          git commit -m "Refresh dependency lockfile"
          git push origin HEAD:agent/full-code-review-20260714
