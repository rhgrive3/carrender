name: Apply strict real-data fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-strict-real-data-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/strict-material-daily-spread-real-data'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply verified implementation
        shell: bash
        run: |
          base64 --decode .github/strict-real-data-fix.patch.gz.b64 | gzip --decompress > /tmp/strict-real-data-fix.patch
          if git apply --reverse --check /tmp/strict-real-data-fix.patch; then
            echo 'Implementation already applied'
            exit 0
          fi
          git apply --check /tmp/strict-real-data-fix.patch
          git apply /tmp/strict-real-data-fix.patch
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/lib/schedulerV2.ts scripts/strict-plan-quality-real-data.test.ts
          git commit -m 'fix: balance strict materials across feasible days'
          git push origin HEAD:${{ github.head_ref }}
