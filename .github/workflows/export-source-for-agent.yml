name: Apply implementation patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-implementation-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/compact-backup-and-strict-plan-quality'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply verified implementation
        shell: bash
        run: |
          base64 --decode .github/implementation.patch.gz.b64 | gzip --decompress > /tmp/implementation.patch
          if git apply --reverse --check /tmp/implementation.patch; then
            echo 'Implementation already applied'
            exit 0
          fi
          git apply --check /tmp/implementation.patch
          git apply /tmp/implementation.patch
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json scripts src
          git commit -m 'fix: compact backups and preserve strict plan quality'
          git push origin HEAD:${{ github.head_ref }}
