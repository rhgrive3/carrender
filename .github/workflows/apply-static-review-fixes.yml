name: Apply static review fixes

on:
  push:
    branches:
      - agent/fix-static-review-findings-20260714

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-static-review-findings-20260714
          fetch-depth: 0

      - name: Apply reviewed source set
        shell: bash
        run: |
          set -euo pipefail

          cat .github/static-review-payload/code-*.b64 | tr -d '\n' | base64 -d > /tmp/code.patch.gz
          echo 'f88b0f39bc237f0994f2b51088bf1431cf03a849033bf89547291f0755e6c938  /tmp/code.patch.gz' | sha256sum -c -
          gzip -dc /tmp/code.patch.gz > /tmp/code.patch
          git apply --check /tmp/code.patch
          git apply /tmp/code.patch

          cat .github/static-review-payload/readme-*.b64 | tr -d '\n' | base64 -d > README.md

          git rm -r .github/static-review-payload .github/workflows/apply-static-review-fixes.yml
          git status --short

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix offline data safety and static review findings'
          git push origin HEAD:agent/fix-static-review-findings-20260714
