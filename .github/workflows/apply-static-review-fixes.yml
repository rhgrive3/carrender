name: Apply static review fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-static-review-findings-20260714
          fetch-depth: 0
          show-progress: false

      - name: Apply reviewed source set
        shell: bash
        run: |
          set -euo pipefail

          cat .github/static-review-payload/code-*.b64 | tr -d '\n' | base64 -d > /tmp/code.patch.gz
          echo 'f88b0f39bc237f0994f2b51088bf1431cf03a849033bf89547291f0755e6c938  /tmp/code.patch.gz' | sha256sum -c -
          gzip -dc /tmp/code.patch.gz > /tmp/code.patch
          git apply --check --verbose \
            --exclude=functions/api/data.ts \
            --exclude=scripts/data-api.test.ts \
            /tmp/code.patch
          git apply \
            --exclude=functions/api/data.ts \
            --exclude=scripts/data-api.test.ts \
            /tmp/code.patch

          base64 -d .github/static-review-payload/current-data-ts.b64 > functions/api/data.ts
          base64 -d .github/static-review-payload/current-data-test.b64 > scripts/data-api.test.ts
          echo '43c2fb728739a79eb4d8d4a774e1fc4bfe2289819f91642c59941f8d512bee82  functions/api/data.ts' | sha256sum -c -
          echo '2e74e3621be2168d4befbe03badbd7c5736886eb741d1fd8eab0045f0e4f2179  scripts/data-api.test.ts' | sha256sum -c -

          cat .github/static-review-payload/readme-*.b64 | tr -d '\n' | base64 -d > README.md

          git rm -r .github/static-review-payload .github/workflows/apply-static-review-fixes.yml
          git status --short
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix offline data safety and static review findings'
          git push origin HEAD:agent/fix-static-review-findings-20260714
