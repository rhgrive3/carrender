name: Apply static review fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-static-review-findings-20260714
          fetch-depth: 0
          show-progress: false

      - name: Apply reviewed source set
        shell: bash
        run: |
          set +e
          set -u
          rm -f static-review-diagnostic.txt
          cat .github/static-review-payload/code-*.b64 | tr -d '\n' | base64 -d > /tmp/code.patch.gz
          decode_status=$?
          actual_sha=$(sha256sum /tmp/code.patch.gz | awk '{print $1}')
          expected_sha='f88b0f39bc237f0994f2b51088bf1431cf03a849033bf89547291f0755e6c938'
          gzip -t /tmp/code.patch.gz
          gzip_status=$?
          if [ "$gzip_status" -eq 0 ]; then gzip -dc /tmp/code.patch.gz > /tmp/code.patch; else : > /tmp/code.patch; fi
          git apply --check --verbose /tmp/code.patch > /tmp/apply-check.txt 2>&1
          apply_status=$?

          if [ "$decode_status" -ne 0 ] || [ "$actual_sha" != "$expected_sha" ] || [ "$gzip_status" -ne 0 ] || [ "$apply_status" -ne 0 ]; then
            {
              echo "base64 decode status: $decode_status"
              echo "actual gzip sha: $actual_sha"
              echo "expected gzip sha: $expected_sha"
              echo "gzip status: $gzip_status"
              echo "apply status: $apply_status"
              cat /tmp/apply-check.txt
            } > static-review-diagnostic.txt
            cat static-review-diagnostic.txt
            exit 1
          fi

          set -e
          git apply /tmp/code.patch
          cat .github/static-review-payload/readme-*.b64 | tr -d '\n' | base64 -d > README.md
          git rm -r .github/static-review-payload .github/workflows/apply-static-review-fixes.yml
          git status --short
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix offline data safety and static review findings'
          git push origin HEAD:agent/fix-static-review-findings-20260714

      - name: Upload patch diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: static-review-diagnostic
          path: static-review-diagnostic.txt
          if-no-files-found: error
          retention-days: 1
