name: Apply static review fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-static-review-findings-20260714
          fetch-depth: 0
          show-progress: false

      - name: Diagnose and apply reviewed source set
        id: apply
        shell: bash
        run: |
          set +e
          : > apply-trace.txt
          cat .github/static-review-payload/code-*.b64 | tr -d '\n' | base64 -d > /tmp/code.patch.gz
          echo "decode=$?" >> apply-trace.txt
          sha256sum /tmp/code.patch.gz >> apply-trace.txt
          gzip -t /tmp/code.patch.gz
          echo "gzip=$?" >> apply-trace.txt
          gzip -dc /tmp/code.patch.gz > /tmp/code.patch
          echo "gunzip=$?" >> apply-trace.txt
          git apply --check --verbose --exclude=functions/api/data.ts --exclude=scripts/data-api.test.ts /tmp/code.patch >> apply-trace.txt 2>&1
          check_status=$?
          echo "apply_check=$check_status" >> apply-trace.txt
          if [ "$check_status" -ne 0 ]; then cat apply-trace.txt; exit 1; fi
          git apply --exclude=functions/api/data.ts --exclude=scripts/data-api.test.ts /tmp/code.patch >> apply-trace.txt 2>&1
          apply_status=$?
          echo "apply=$apply_status" >> apply-trace.txt
          if [ "$apply_status" -ne 0 ]; then cat apply-trace.txt; exit 1; fi

          base64 -d .github/static-review-payload/current-data-ts.b64 > functions/api/data.ts
          echo "data_decode=$?" >> apply-trace.txt
          base64 -d .github/static-review-payload/current-data-test.b64 > scripts/data-api.test.ts
          echo "test_decode=$?" >> apply-trace.txt
          sha256sum functions/api/data.ts scripts/data-api.test.ts >> apply-trace.txt

          cat .github/static-review-payload/readme-*.b64 | tr -d '\n' | base64 -d > README.md
          echo "readme_decode=$?" >> apply-trace.txt

          git rm -r .github/static-review-payload .github/workflows/apply-static-review-fixes.yml >> apply-trace.txt 2>&1
          echo "git_rm=$?" >> apply-trace.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix offline data safety and static review findings' >> apply-trace.txt 2>&1
          echo "commit=$?" >> apply-trace.txt
          git push origin HEAD:agent/fix-static-review-findings-20260714 >> apply-trace.txt 2>&1
          push_status=$?
          echo "push=$push_status" >> apply-trace.txt
          cat apply-trace.txt
          exit "$push_status"

      - name: Upload apply trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-review-apply-trace
          path: apply-trace.txt
          if-no-files-found: error
          retention-days: 1
