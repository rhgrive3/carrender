name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-startup-patch:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply verified source patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/state/AppContext.tsx')
          text = path.read_text()

          start_marker = '  // Startup reconciliation. A durable dirty snapshot is never replaced by a\n'
          end_marker = '  useEffect(() => {\n    if (!syncReady || !owner || syncConflict.current) return;\n'
          start = text.index(start_marker)
          end = text.index(end_marker, start)
          block = text[start:end]
          original = block

          block = block.replace(
              '    let cancelled = false;\n',
              '    let cancelled = false;\n    const controller = new AbortController();\n',
              1,
          )
          block = block.replace('await apiGetData()', 'await apiGetData({ signal: controller.signal })')
          block = block.replace(
              'await apiPutData(localState, response.updatedAt)',
              'await apiPutData(localState, response.updatedAt, { signal: controller.signal })',
              1,
          )
          block = block.replace(
              '    return () => {\n      cancelled = true;\n    };\n',
              '    return () => {\n      cancelled = true;\n      controller.abort();\n    };\n',
              1,
          )
          if block == original:
              raise SystemExit('startup sync block was not changed')
          if block.count('apiGetData({ signal: controller.signal })') != 2:
              raise SystemExit('expected both startup GET requests to be cancellable')
          if block.count('controller.abort();') != 1:
              raise SystemExit('expected one startup cleanup abort')
          text = text[:start] + block + text[end:]

          old_render = '''  const value = useMemo(() => ({ state, dispatch, execute, syncStatus, syncConflict: syncConflictInfo, hasUnsyncedChanges, resolveSyncConflict, retrySync, syncErrorMessage, localSaveError }), [state, dispatch, execute, syncStatus, syncConflictInfo, hasUnsyncedChanges, resolveSyncConflict, retrySync, syncErrorMessage, localSaveError]);
  if (owner && !syncReady) {
    return <div className="screen"><div className="card">クラウドの最新データを確認中…</div></div>;
  }
  return <AppContext.Provider value={value}>
    {children}
'''
          new_render = '''  const value = useMemo(() => ({ state, dispatch, execute, syncStatus, syncConflict: syncConflictInfo, hasUnsyncedChanges, resolveSyncConflict, retrySync, syncErrorMessage, localSaveError }), [state, dispatch, execute, syncStatus, syncConflictInfo, hasUnsyncedChanges, resolveSyncConflict, retrySync, syncErrorMessage, localSaveError]);
  // 端末内データがある場合は即座に操作可能にする。新しい端末でデータが空の時だけ、
  // オンボーディングを誤表示しないよう初回クラウド取得を待つ。
  const shouldWaitForInitialCloudState = Boolean(owner && !syncReady && !state.onboarded);
  if (shouldWaitForInitialCloudState) {
    return <div className="screen"><div className="card">クラウドの最新データを確認中…</div></div>;
  }
  return <AppContext.Provider value={value}>
    {children}
    {owner && !syncReady && state.onboarded && (
      <div className="toast undo-notice" role="status">端末内データを表示しています。クラウド同期を確認中…</div>
    )}
'''
          if text.count(old_render) != 1:
              raise SystemExit('render guard source did not match exactly once')
          text = text.replace(old_render, new_render, 1)
          path.write_text(text)
          PY

      - name: Restore normal workflow and commit
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/apply-sync-startup-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/state/AppContext.tsx .github/workflows/ci.yml .github/workflows/apply-sync-startup-patch.yml
          git commit -m "Render local state while startup sync runs"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and regression tests
        run: npm test

      - name: Cloudflare API integration tests
        run: npm run test:integration:api

      - name: Production build
        run: npm run build

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: IndexedDB browser integration tests
        run: npm run test:integration:browser

      - name: Browser end-to-end tests
        run: npm run test:e2e
