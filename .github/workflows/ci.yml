          text = replace_once(text, "      {tab === 'analytics' && <AnalyticsScreen />}", "      {tab === 'analytics' && <AnalyticsScreen />}\n      {tab === 'history' && <PlanHistoryScreen />}", 'history screen render')
          path.write_text(text)

