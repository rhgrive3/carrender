name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-scheduler-policy:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/fix-scheduler-policy' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-scheduler-policy
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply, verify, and commit
        run: |
          python3 scripts/apply-scheduler-policy.py
          rm scripts/apply-scheduler-policy.py .github/workflows/apply-scheduler-policy.yml
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          npm ci
          npm run typecheck
          npm run test:scheduler
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "スケジューラ調整値を名前付きpolicyへ集約する"
          git push origin HEAD:agent/fix-scheduler-policy

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and regression tests
        shell: bash
        run: set -o pipefail; npm test 2>&1 | tee verify-tests.log

      - name: Upload verify failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-failure-log
          path: verify-tests.log
          if-no-files-found: ignore

      - name: Cloudflare API integration tests
        run: npm run test:integration:api

      - name: Production build
        run: npm run build

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: IndexedDB browser integration tests
        run: npm run test:integration:browser

      - name: Browser end-to-end tests
        shell: bash
        run: set -o pipefail; npm run test:e2e 2>&1 | tee browser-e2e.log

      - name: PWA update and storage compatibility
        shell: bash
        run: set -o pipefail; npm run test:pwa:update 2>&1 | tee -a browser-e2e.log

      - name: Upload browser failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-failure-log
          path: browser-e2e.log
          if-no-files-found: ignore

  ios-webkit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install WebKit
        run: npx playwright install --with-deps webkit

      - name: iPhone and iPad fixed-navigation regression
        shell: bash
        env:
          BROWSER: webkit
        run: set -o pipefail; node scripts/bottom-navigation-browser.mjs 2>&1 | tee ios-webkit.log

      - name: iOS pagehide emergency-cache regression
        shell: bash
        run: set -o pipefail; node scripts/emergency-cache-webkit.mjs 2>&1 | tee -a ios-webkit.log

      - name: Upload WebKit failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-webkit-failure-log
          path: ios-webkit.log
          if-no-files-found: ignore
