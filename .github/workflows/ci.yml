name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and regression tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Production build
        run: npm run build

      - name: Upload review source snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-source-${{ github.sha }}
          retention-days: 1
          if-no-files-found: error
          path: |
            src
            functions
            scripts
            schema
            migrations
            package.json
            package-lock.json
            tsconfig*.json
            vite.config.ts
            wrangler.toml
            index.html

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser end-to-end tests
        run: npm run test:e2e
