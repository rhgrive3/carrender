          text = replace_once(text, "  | { type: 'RESCHEDULE_FROM'; fromDate: ISODate; reason: string }\n  | { type: 'TODAY_IMPOSSIBLE' }", "  | { type: 'RESCHEDULE_FROM'; fromDate: ISODate; reason: string }\n  | { type: 'RESTORE_PLAN_REVISION'; revisionId: string }\n  | { type: 'TODAY_IMPOSSIBLE' }", 'restore action type')
          text = replace_once(
              text,
              "    case 'RESCHEDULE_FROM':\n      return generatePlan(state, action.fromDate, action.reason).state;\n\n    case 'TODAY_IMPOSSIBLE':",
              "    case 'RESCHEDULE_FROM':\n      return generatePlan(state, action.fromDate, action.reason).state;\n\n    case 'RESTORE_PLAN_REVISION':\n      return restorePlanRevisionLayout(state, action.revisionId).state;\n\n    case 'TODAY_IMPOSSIBLE':",
