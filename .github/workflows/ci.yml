          envelopes = r'''
interface PlanRevisionEnvelope { __kind: 'planRevision'; value: PlanRevision }
interface HistoricalMonthSummaryEnvelope { __kind: 'historySummary'; value: HistoricalMonthSummary }

'''
          text = replace_once(text, 'const encoder = new TextEncoder();', envelopes + 'const encoder = new TextEncoder();', 'chunk envelopes')
          text = replace_once(
              text,
              '    planHistory: state.planHistory ?? [],',
              "    planHistory: [\n      ...(state.planHistory ?? []),\n      ...(state.planRevisions ?? []).map((value) => ({ __kind: 'planRevision' as const, value })),\n      ...(state.historySummaries ?? []).map((value) => ({ __kind: 'historySummary' as const, value })),\n    ],",
              'encode history envelopes',
          )
          text = replace_once(
              text,
              "  const meta = metaItems[0] as AppStateMetaSection;\n  return {",
              "  const meta = metaItems[0] as AppStateMetaSection;\n  const historyItems = decoded.get('planHistory') ?? [];\n  const planHistory = historyItems.filter((item) => !(item && typeof item === 'object' && '__kind' in item)) as PlanHistoryEntry[];\n  const planRevisions = historyItems\n    .filter((item): item is PlanRevisionEnvelope => Boolean(item && typeof item === 'object' && (item as PlanRevisionEnvelope).__kind === 'planRevision'))\n    .map((item) => item.value);\n  const historySummaries = historyItems\n    .filter((item): item is HistoricalMonthSummaryEnvelope => Boolean(item && typeof item === 'object' && (item as HistoricalMonthSummaryEnvelope).__kind === 'historySummary'))\n    .map((item) => item.value);\n  return {",
              'decode history envelopes',
          )
          text = replace_once(
              text,
              "    planHistory: (decoded.get('planHistory') ?? []) as PlanHistoryEntry[],\n    availability:",
              "    planHistory,\n    planRevisions,\n    historySummaries,\n    availability:",
              'decoded history fields',
          )
          path.write_text(text)

          # IndexedDB stores
          path = Path('src/lib/appStateIndexedDb.ts')
          text = path.read_text()
          text = replace_once(text, '  FixedEvent,\n  Material,\n  PlanHistoryEntry,', '  FixedEvent,\n  HistoricalMonthSummary,\n  Material,\n  PlanHistoryEntry,\n  PlanRevision,', 'indexeddb imports')
          text = replace_once(text, 'const MAIN_STATE_DB_VERSION = 1;', 'const MAIN_STATE_DB_VERSION = 2;', 'indexeddb version')
          text = replace_once(
              text,
              "  planHistory: 'mainPlanHistory',\n  availability:",
              "  planHistory: 'mainPlanHistory',\n  planRevisions: 'mainPlanRevisions',\n  historySummaries: 'mainHistorySummaries',\n  availability:",
              'indexeddb store names',
          )
          text = replace_once(
              text,
              "  const history = database.createObjectStore(MAIN_STATE_STORES.planHistory, { keyPath: 'id' });\n  history.createIndex('scheduledDate', 'scheduledDate');\n  history.createIndex('materialId', 'materialId');\n\n  database.createObjectStore(MAIN_STATE_STORES.availability, { keyPath: 'weekday' });",
              "  const history = database.createObjectStore(MAIN_STATE_STORES.planHistory, { keyPath: 'id' });\n  history.createIndex('scheduledDate', 'scheduledDate');\n  history.createIndex('materialId', 'materialId');\n\n  const revisions = database.createObjectStore(MAIN_STATE_STORES.planRevisions, { keyPath: 'id' });\n  revisions.createIndex('createdAt', 'createdAt');\n  database.createObjectStore(MAIN_STATE_STORES.historySummaries, { keyPath: 'month' });\n\n  database.createObjectStore(MAIN_STATE_STORES.availability, { keyPath: 'weekday' });",
              'indexeddb schema stores',
          )
          text = replace_once(
              text,
              "  request.addEventListener('upgradeneeded', (event) => {\n    if ((event as IDBVersionChangeEvent).oldVersion === 0) createSchema(request.result);\n  });",
              "  request.addEventListener('upgradeneeded', (event) => {\n    const oldVersion = (event as IDBVersionChangeEvent).oldVersion;\n    const database = request.result;\n    if (oldVersion === 0) createSchema(database);\n    else {\n      if (!database.objectStoreNames.contains(MAIN_STATE_STORES.planRevisions)) {\n        const revisions = database.createObjectStore(MAIN_STATE_STORES.planRevisions, { keyPath: 'id' });\n        revisions.createIndex('createdAt', 'createdAt');\n      }\n      if (!database.objectStoreNames.contains(MAIN_STATE_STORES.historySummaries)) {\n        database.createObjectStore(MAIN_STATE_STORES.historySummaries, { keyPath: 'month' });\n      }\n    }\n  });",
              'indexeddb upgrade',
          )
          text = replace_once(
              text,
              "    { store: MAIN_STATE_STORES.planHistory, values: state.planHistory ?? [], previousValues: previous?.planHistory ?? [], key: (value) => (value as PlanHistoryEntry).id },\n    { store: MAIN_STATE_STORES.availability,",
              "    { store: MAIN_STATE_STORES.planHistory, values: state.planHistory ?? [], previousValues: previous?.planHistory ?? [], key: (value) => (value as PlanHistoryEntry).id },\n    { store: MAIN_STATE_STORES.planRevisions, values: state.planRevisions ?? [], previousValues: previous?.planRevisions ?? [], key: (value) => (value as PlanRevision).id },\n    { store: MAIN_STATE_STORES.historySummaries, values: state.historySummaries ?? [], previousValues: previous?.historySummaries ?? [], key: (value) => (value as HistoricalMonthSummary).month },\n    { store: MAIN_STATE_STORES.availability,",
              'indexeddb descriptors',
          )
          text = replace_once(
              text,
              '    const [meta, settingsRecord, goals, subjects, materials, tasks, sessions, planHistory, availability, dayPlans, fixedEvents] = await Promise.all([',
              '    const [meta, settingsRecord, goals, subjects, materials, tasks, sessions, planHistory, planRevisions, historySummaries, availability, dayPlans, fixedEvents] = await Promise.all([',
              'indexeddb load destructure',
          )
          text = replace_once(
              text,
              '      getAll<PlanHistoryEntry>(MAIN_STATE_STORES.planHistory),\n      getAll<AvailabilitySlot>',
              '      getAll<PlanHistoryEntry>(MAIN_STATE_STORES.planHistory),\n      getAll<PlanRevision>(MAIN_STATE_STORES.planRevisions),\n      getAll<HistoricalMonthSummary>(MAIN_STATE_STORES.historySummaries),\n      getAll<AvailabilitySlot>',
              'indexeddb load requests',
          )
          text = replace_once(
              text,
              '      planHistory,\n      sessions,',
              '      planHistory,\n      planRevisions,\n      historySummaries,\n      sessions,',
              'indexeddb candidate fields',
          )
          path.write_text(text)

          # Scheduler integration
          path = Path('src/lib/scheduler.ts')
          text = path.read_text()
          text = replace_once(text, "import { generatePlanV2 } from './schedulerRecovery';", "import { generatePlanV2 } from './schedulerRecovery';\nimport { applyOneYearHistoryRetention } from './historyRetention';\nimport { appendPlanRevision, capturePlanRevision } from './planHistory';", 'scheduler history imports')
          text = replace_once(text, '  const generationId = options.generationId ?? `plan-${fromDate}`;', '  const generationId = options.generationId ?? `plan-${fromDate}-${now.getTime()}`;', 'unique generation id')
          text = replace_once(
              text,
              '  const todayDate = dateInTimeZone(now, timezone);\n  const planHistory = captureMissedPlanHistory(state, todayDate, new Date(now).toISOString());',
              '  const todayDate = dateInTimeZone(now, timezone);\n  state = applyOneYearHistoryRetention(state, todayDate);\n  const revisionBase = state;\n  const planHistory = captureMissedPlanHistory(state, todayDate, new Date(now).toISOString());',
              'scheduler retention start',
          )
          old_return = r'''  return {
    state: {
      ...state,
      tasks: unique,
      planHistory,
      lastScheduleResult: schedule,
      lastPlanReason: reason,
      lastReschedule: result,
      lastPlannedDate: todayDate,
    },
    result,
  };
'''
          new_return = r'''  const nextState: AppState = {
    ...state,
    tasks: unique,
    planHistory,
    lastScheduleResult: schedule,
    lastPlanReason: reason,
    lastReschedule: result,
    lastPlannedDate: todayDate,
  };
  const revision = capturePlanRevision({
    before: revisionBase,
    after: nextState,
    generationId,
    reason,
    fromDate,
    createdAt: schedule.generatedAt,
  });
  return { state: appendPlanRevision(nextState, revision, now), result };
'''
          text = replace_once(text, old_return, new_return, 'scheduler revision append')
          path.write_text(text)

          # App reducer and initial state
          path = Path('src/state/AppContext.tsx')
