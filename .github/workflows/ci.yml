name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and regression tests
        run: npm test

      - name: Cloudflare API integration tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:integration:api 2>&1 | tee api-integration.log

      - name: Preserve API integration log
        uses: actions/upload-artifact@v4
        with:
          name: api-integration-${{ github.run_id }}
          path: api-integration.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail when API integration failed
        shell: bash
        run: grep -q 'ALL PASS (main AppState API)' api-integration.log

      - name: Production build
        run: npm run build

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: IndexedDB browser integration tests
        run: npm run test:integration:browser

      - name: Browser end-to-end tests
        run: npm run test:e2e
