name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Apply deleted-subject filter fix
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/fix-deleted-subject-filter-v2' && github.actor != 'github-actions[bot]'
        run: |
          python <<'PY'
          from pathlib import Path
          lib = Path('src/lib/recordSubjects.ts')
          text = lib.read_text()
          marker = "\n/** セッションを科目別に集計し、削除済み科目も失わず返す。 */\n"
          addition = """
/** 学習ログの科目フィルター候補。現行科目に加え、記録が残る削除済み科目も返す。 */
export function listRecordSubjectFilters(
  sessions: Pick<StudySession, 'subjectId'>[],
  subjects: Subject[],
): RecordSubjectDisplay[] {
  const active = subjects.map((subject) => resolveRecordSubject(subjects, subject.id));
  const activeIds = new Set(subjects.map((subject) => subject.id));
  const deletedIds = [...new Set(sessions.map((session) => session.subjectId))]
    .filter((subjectId) => !activeIds.has(subjectId));
  const deleted = deletedIds
    .map((subjectId) => resolveRecordSubject(subjects, subjectId))
    .sort((a, b) => a.name.localeCompare(b.name, 'ja') || a.id.localeCompare(b.id));
  return [...active, ...deleted];
}
"""
          if 'export function listRecordSubjectFilters' not in text:
            if marker not in text: raise SystemExit('recordSubjects marker not found')
            lib.write_text(text.replace(marker, '\n' + addition + marker))
          screen = Path('src/screens/RecordsScreen.tsx')
          text = screen.read_text()
          text = text.replace("import { resolveRecordSubject, summarizeRecordSubjects } from '../lib/recordSubjects';", "import { listRecordSubjectFilters, resolveRecordSubject, summarizeRecordSubjects } from '../lib/recordSubjects';")
          memo_marker = "  const filteredLogSessions = useMemo(() => {\n"
          memo_addition = "  const logSubjectOptions = useMemo(\n    () => listRecordSubjectFilters(state.sessions, state.subjects),\n    [state.sessions, state.subjects],\n  );\n"
          if 'const logSubjectOptions = useMemo(' not in text:
            if memo_marker not in text: raise SystemExit('filteredLogSessions marker not found')
            text = text.replace(memo_marker, memo_addition + memo_marker)
          old = "{state.subjects.map((subject) => <option value={subject.id} key={subject.id}>{subject.name}</option>)}"
          new = "{logSubjectOptions.map((subject) => <option value={subject.id} key={subject.id}>{subject.name}</option>)}"
          if old in text: text = text.replace(old, new)
          elif new not in text: raise SystemExit('subject filter select pattern not found')
          screen.write_text(text)
          test = Path('scripts/record-subject-display.test.ts')
          text = test.read_text().replace("import { resolveRecordSubject, summarizeRecordSubjects } from '../src/lib/recordSubjects';", "import { listRecordSubjectFilters, resolveRecordSubject, summarizeRecordSubjects } from '../src/lib/recordSubjects';")
          marker = "\nconst chartFixCss = readFileSync"
          addition = """

const filterOptions = listRecordSubjectFilters([
  { subjectId: 'subject-active' },
  { subjectId: 'subject-deleted' },
  { subjectId: 'subject-deleted-2' },
  { subjectId: 'subject-deleted' },
], subjects);
assert.deepEqual(filterOptions.map((subject) => subject.id), ['subject-active', 'subject-deleted-2', 'subject-deleted']);
assert.equal(filterOptions[0].name, '数学');
assert.ok(filterOptions.slice(1).every((subject) => subject.deleted));
const recordsSource = readFileSync(new URL('../src/screens/RecordsScreen.tsx', import.meta.url), 'utf8');
assert.match(recordsSource, /listRecordSubjectFilters\(state\.sessions, state\.subjects\)/);
assert.match(recordsSource, /logSubjectOptions\.map\(\(subject\)/);
"""
          if 'const filterOptions = listRecordSubjectFilters' not in text:
            if marker not in text: raise SystemExit('record subject test marker not found')
            text = text.replace(marker, addition + marker)
          test.write_text(text)
          PY
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/lib/recordSubjects.ts src/screens/RecordsScreen.tsx scripts/record-subject-display.test.ts .github/workflows/ci.yml
          git commit -m "fix: filter records by deleted subjects"
          git push origin HEAD:agent/fix-deleted-subject-filter-v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and regression tests
        shell: bash
        run: set -o pipefail; npm test 2>&1 | tee verify-tests.log

      - name: Upload verify failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-failure-log
          path: verify-tests.log
          if-no-files-found: ignore

      - name: Cloudflare API integration tests
        run: npm run test:integration:api

      - name: Production build
        run: npm run build

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: IndexedDB browser integration tests
        run: npm run test:integration:browser

      - name: Browser end-to-end tests
        shell: bash
        run: set -o pipefail; npm run test:e2e 2>&1 | tee browser-e2e.log

      - name: Upload browser failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-failure-log
          path: browser-e2e.log
          if-no-files-found: ignore
