name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and regression tests
        shell: bash
        run: set -o pipefail; npm test 2>&1 | tee verify-tests.log

      - name: Upload verify failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-failure-log
          path: verify-tests.log
          if-no-files-found: ignore

      - name: Cloudflare API integration tests
        run: npm run test:integration:api

      - name: Production build
        run: npm run build

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: IndexedDB browser integration tests
        run: npm run test:integration:browser

      - name: Browser end-to-end tests
        shell: bash
        run: set -o pipefail; npm run test:e2e 2>&1 | tee browser-e2e.log

      - name: Upload browser failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-failure-log
          path: browser-e2e.log
          if-no-files-found: ignore

  ios-webkit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install WebKit
        run: npx playwright install --with-deps webkit

      - name: iPhone and iPad fixed-navigation regression
        shell: bash
        env:
          BROWSER: webkit
        run: set -o pipefail; node scripts/bottom-navigation-browser.mjs 2>&1 | tee ios-webkit.log

      - name: iOS pagehide emergency-cache regression
        shell: bash
        run: set -o pipefail; node scripts/emergency-cache-webkit.mjs 2>&1 | tee -a ios-webkit.log

      - name: Upload WebKit failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-webkit-failure-log
          path: ios-webkit.log
          if-no-files-found: ignore
