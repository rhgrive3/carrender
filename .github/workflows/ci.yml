name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply reviewed plan history integration
        if: github.actor != 'github-actions[bot]' && (github.head_ref == 'agent/mandatory-plan-history-retention-20260714' || github.ref_name == 'agent/mandatory-plan-history-retention-20260714')
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'{label} target not found')
              return text.replace(old, new, 1)

          # Types
          path = Path('src/types/index.ts')
          text = path.read_text()
          interfaces = r'''
export interface PlanRevisionTaskPlacement {
  key: string;
  taskId: string;
  title: string;
  materialId: string | null;
  estimatedMinutes: number;
  scheduledDate: ISODate;
  scheduledStart: string | null;
  scheduledEnd: string | null;
  placementStatus?: StudyTask['placementStatus'];
  placementLock?: StudyTask['placementLock'];
  manualOrder?: number;
}

export interface PlanRevisionChange {
  key: string;
  taskId: string;
  title: string;
  materialId: string | null;
  kind: 'added' | 'removed' | 'moved' | 'updated';
  before?: PlanRevisionTaskPlacement;
  after?: PlanRevisionTaskPlacement;
}

export interface PlanRevisionMaterialChange {
  materialId: string;
  changedTasks: number;
  movedTasks: number;
  beforeMinutes: number;
  afterMinutes: number;
}

/** 計画再生成時点の監査履歴。現在の進捗を保った配置復元に使う。 */
export interface PlanRevision {
  id: string;
  generationId: string;
  createdAt: string;
  reason: string;
  fromDate: ISODate;
  placements: PlanRevisionTaskPlacement[];
  changes: PlanRevisionChange[];
  materialChanges: PlanRevisionMaterialChange[];
}

/** 直近1年より前の詳細履歴を月単位へ圧縮した集計。 */
export interface HistoricalMonthSummary {
  month: string;
  studyMinutes: number;
  sessionCount: number;
  completedTaskCount: number;
  plannedMinutes: number;
  missedMinutes: number;
  subjectMinutes: { subjectId: string; minutes: number }[];
}

'''
          text = replace_once(text, 'export interface ManualTaskScheduling {', interfaces + 'export interface ManualTaskScheduling {', 'history type insertion')
          text = replace_once(
              text,
              "  /** v4以前の保存データでは未定義。normalizeStateで空配列へ補完する。 */\n  planHistory?: PlanHistoryEntry[];\n  sessions: StudySession[];",
              "  /** v4以前の保存データでは未定義。normalizeStateで空配列へ補完する。 */\n  planHistory?: PlanHistoryEntry[];\n  /** 計画再生成の監査・配置復元履歴。 */\n  planRevisions?: PlanRevision[];\n  /** 1年より前の詳細履歴を圧縮した月次集計。 */\n  historySummaries?: HistoricalMonthSummary[];\n  sessions: StudySession[];",
              'AppState history fields',
          )
          path.write_text(text)

          # Storage migration
          path = Path('src/lib/storage.ts')
          text = path.read_text()
          text = replace_once(text, "import { clearMainSyncMetadata } from './mainSync';", "import { clearMainSyncMetadata } from './mainSync';\nimport { applyOneYearHistoryRetention } from './historyRetention';", 'retention import')
          text = replace_once(text, 'export const STATE_VERSION = 6;', 'export const STATE_VERSION = 7;', 'state version')
          text = replace_once(
              text,
              "    && (candidate.planHistory === undefined || Array.isArray(candidate.planHistory))\n    && Array.isArray(candidate.sessions)",
              "    && (candidate.planHistory === undefined || Array.isArray(candidate.planHistory))\n    && (candidate.planRevisions === undefined || Array.isArray(candidate.planRevisions))\n    && (candidate.historySummaries === undefined || Array.isArray(candidate.historySummaries))\n    && Array.isArray(candidate.sessions)",
              'shape history arrays',
          )
          text = replace_once(text, '  const state = normalizeState(input);', '  const state = applyOneYearHistoryRetention(normalizeState(input), toISODate(new Date()));', 'retention during migration')
          text = replace_once(
              text,
              '    planHistory: normalizePlanHistory(input.planHistory, normalizeSubjectId),\n    sessions: (input.sessions ?? []).map((session) => ({',
              '    planHistory: normalizePlanHistory(input.planHistory, normalizeSubjectId),\n    planRevisions: normalizePlanRevisions(input.planRevisions),\n    historySummaries: normalizeHistorySummaries(input.historySummaries, normalizeSubjectId),\n    sessions: (input.sessions ?? []).map((session) => ({',
              'normalize new history fields',
          )
          helpers = r'''
function normalizePlanRevisions(value: AppState['planRevisions'] | undefined): NonNullable<AppState['planRevisions']> {
  if (!Array.isArray(value)) return [];
  const byId = new Map<string, NonNullable<AppState['planRevisions']>[number]>();
  for (const revision of value) {
    if (!revision
      || typeof revision.id !== 'string'
      || typeof revision.generationId !== 'string'
      || typeof revision.reason !== 'string'
      || !validISODate(revision.fromDate)
      || !Number.isFinite(Date.parse(revision.createdAt))
      || !Array.isArray(revision.placements)
      || !Array.isArray(revision.changes)
      || !Array.isArray(revision.materialChanges)) continue;
    byId.set(revision.id, revision);
  }
  return [...byId.values()].sort((left, right) => left.createdAt.localeCompare(right.createdAt));
}

function normalizeHistorySummaries(
  value: AppState['historySummaries'] | undefined,
  normalizeSubjectId: (subjectId: string) => string,
): NonNullable<AppState['historySummaries']> {
  if (!Array.isArray(value)) return [];
  const byMonth = new Map<string, NonNullable<AppState['historySummaries']>[number]>();
  for (const summary of value) {
    if (!summary || typeof summary.month !== 'string' || !/^\d{4}-\d{2}$/u.test(summary.month)) continue;
    byMonth.set(summary.month, {
      month: summary.month,
      studyMinutes: Math.max(0, Math.round(Number(summary.studyMinutes) || 0)),
      sessionCount: Math.max(0, Math.round(Number(summary.sessionCount) || 0)),
      completedTaskCount: Math.max(0, Math.round(Number(summary.completedTaskCount) || 0)),
      plannedMinutes: Math.max(0, Math.round(Number(summary.plannedMinutes) || 0)),
      missedMinutes: Math.max(0, Math.round(Number(summary.missedMinutes) || 0)),
      subjectMinutes: Array.isArray(summary.subjectMinutes)
        ? summary.subjectMinutes
          .filter((item) => item && typeof item.subjectId === 'string' && Number.isFinite(item.minutes))
          .map((item) => ({ subjectId: normalizeSubjectId(item.subjectId), minutes: Math.max(0, Math.round(item.minutes)) }))
        : [],
    });
  }
  return [...byMonth.values()].sort((left, right) => left.month.localeCompare(right.month));
}

'''
          text = replace_once(text, 'function normalizeCompletedRanges(', helpers + 'function normalizeCompletedRanges(', 'history normalizers')
          path.write_text(text)

