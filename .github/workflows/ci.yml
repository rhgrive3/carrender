name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply reviewed overdue and analytics fixes
        if: github.actor != 'github-actions[bot]' && (github.head_ref == 'agent/fix-overdue-plan-history-chart-20260714' || github.ref_name == 'agent/fix-overdue-plan-history-chart-20260714')
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'{label} target not found')
              return text.replace(old, new, 1)

          scheduler = Path('src/lib/schedulerV2.ts')
          text = scheduler.read_text()
          text = replace_once(text,
              "function materialSolverItem(material: Material, requiredUnits: number, today: ISODate, sessionMin: number, sessionMax: number): SolverItem {",
              "function materialSolverItem(material: Material, requiredUnits: number, today: ISODate, deadline: ISODate, sessionMin: number, sessionMax: number): SolverItem {",
              'material solver signature')
          text = replace_once(text, "    deadline: material.targetDate,\n    requiredUnits,", "    deadline,\n    requiredUnits,", 'material solver deadline')
          concrete = """  const concreteEnd = state.goal?.examDate && state.goal.examDate > configuredConcreteEnd
    ? state.goal.examDate
    : configuredConcreteEnd;
"""
          text = replace_once(text, concrete, concrete + "  const recoveryDeadlineFor = (material: Material): ISODate => material.targetDate < today ? concreteEnd : material.targetDate;\n", 'recovery deadline helper')
          warning_anchor = """  for (const material of activeMaterials) {
    if (material.preferredFinishDate && (material.preferredFinishDate < material.startDate || material.preferredFinishDate > material.targetDate)) {
"""
          warning_replacement = """  for (const material of activeMaterials) {
    if (material.targetDate < today) {
      const overdueDays = diffDays(material.targetDate, today);
      warnings.push({
        code: 'OVERDUE_RECOVERY',
        targetId: material.id,
        message: `${material.name}は期限を${overdueDays}日超過しています。未完了分を${today}〜${concreteEnd}へ回復計画として再配置します`,
      });
    }
    if (material.preferredFinishDate && (material.preferredFinishDate < material.startDate || material.preferredFinishDate > material.targetDate)) {
"""
          text = replace_once(text, warning_anchor, warning_replacement, 'overdue warning')
          strict_anchor = """      deadline: material.targetDate,
      requiredMinutes: minutesForUnits(material.minutesPerUnit, requiredUnits),
      solverItem: materialSolverItem(material, requiredUnits, today, sessionMin, sessionMax),
"""
          strict_replacement = """      deadline: recoveryDeadlineFor(material),
      requiredMinutes: minutesForUnits(material.minutesPerUnit, requiredUnits),
      solverItem: materialSolverItem(material, requiredUnits, today, recoveryDeadlineFor(material), sessionMin, sessionMax),
"""
          text = replace_once(text, strict_anchor, strict_replacement, 'strict overdue recovery')
          curve_anchor = """    const finish = computeSafetyFinishDate({
      start: curveStart,
      deadline: material.targetDate,
"""
          curve_replacement = """    const finish = computeSafetyFinishDate({
      start: curveStart,
      deadline: recoveryDeadlineFor(material),
"""
          text = replace_once(text, curve_anchor, curve_replacement, 'normal overdue recovery')
          recovery_anchor = """    if (curve.ranges.length === 0 || curve.curveEnd >= curve.material.targetDate) continue;
    const recoveryStart = addDays(curve.curveEnd, 1);
"""
          recovery_replacement = """    const scheduleDeadline = recoveryDeadlineFor(curve.material);
    if (curve.ranges.length === 0 || curve.curveEnd >= scheduleDeadline) continue;
    const recoveryStart = addDays(curve.curveEnd, 1);
"""
          text = replace_once(text, recovery_anchor, recovery_replacement, 'recovery window deadline')
          loop_old = "date <= curve.material.targetDate && curve.ranges.length > 0"
          if text.count(loop_old) < 2:
              raise SystemExit('recovery loops not found')
          text = text.replace(loop_old, "date <= scheduleDeadline && curve.ranges.length > 0", 2)
          scheduler.write_text(text)

          records = Path('src/screens/RecordsScreen.tsx')
          text = records.read_text()
          text = replace_once(text,
              "import { isPlacedPlanTask } from '../lib/taskFilters';",
              "import { isPlacedPlanTask } from '../lib/taskFilters';\nimport { stablePlanTasks } from '../lib/progressChart';",
              'records helper import')
          text = replace_once(text,
              "    for (const task of state.tasks) {\n      if (!isPlacedPlanTask(task)) continue;",
              "    for (const task of stablePlanTasks(state.tasks, state.sessions)) {\n      if (!isPlacedPlanTask(task)) continue;",
              'records stable plan tasks')
          records.write_text(text)

          chart = Path('src/components/charts/GoalProgressChart.tsx')
          text = chart.read_text()
          text = replace_once(text,
              "import { addDays, diffDays, formatDateShort } from '../../lib/date';",
              "import { formatDateShort } from '../../lib/date';\nimport { buildProgressChartDates, stablePlanTasks } from '../../lib/progressChart';",
              'chart helper imports')
          start = text.index('function buildDateRange(')
          end = text.index('\n\nexport function GoalProgressChart', start)
          text = text[:start] + text[end + 2:]
          text = replace_once(text,
              "    const plannedByMaterial = new Map<string, { date: ISODate; amount: number; range?: UnitRange }[]>();\n    for (const task of state.tasks) {",
              "    const stableTasks = stablePlanTasks(state.tasks, state.sessions);\n    const plannedByMaterial = new Map<string, { date: ISODate; amount: number; range?: UnitRange }[]>();\n    for (const task of stableTasks) {",
              'chart stable task source')
          text = replace_once(text,
              "    const dates = buildDateRange(activeMaterials, refDate, plannedDates);",
              "    const dates = buildProgressChartDates(activeMaterials, refDate, plannedDates, state.sessions.map((session) => session.date));",
              'chart date density')
          text = replace_once(text, "          state.tasks,\n          material.id,", "          stableTasks,\n          material.id,", 'chart target task source')
          text = replace_once(text,
              "                type={item.kind === 'target' ? 'stepAfter' : 'monotone'}",
              "                type=\"monotone\"",
              'chart smoothing')
          chart.write_text(text)

          Path('.github/workflows/apply-overdue-history-chart-fix.yml').unlink(missing_ok=True)
          Path('.github/workflows/ci.yml').write_text("""name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
