name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-capacity-optimization:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/scheduler-capacity-search' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: fix/scheduler-capacity-search
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply and verify optimization
        shell: bash
        run: |
          set -o pipefail
          exec > >(tee capacity-apply.log) 2>&1
          python3 <<'BOOTSTRAP'
          from pathlib import Path
          workflow = Path('.github/workflows/agent-scheduler-capacity.yml').read_text(encoding='utf-8')
          marker = "          python3 <<'PY'\n"
          assert marker in workflow
          raw = workflow.split(marker, 1)[1].split("\n          PY", 1)[0]
          embedded = '\n'.join(line[10:] if line.startswith('          ') else line for line in raw.splitlines())
          exec(compile(embedded, 'capacity-patch.py', 'exec'))
          Path('.github/workflows/agent-scheduler-capacity-push.yml').unlink(missing_ok=True)
          Path('.capacity-trigger').unlink(missing_ok=True)
          BOOTSTRAP
          npm ci
          npm run typecheck
          npm run test:scheduler
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/ci.yml')
          source = path.read_text(encoding='utf-8')
          start = source.index('  apply-capacity-optimization:\n')
          end = source.index('  verify:\n', start)
          source = source[:start] + source[end:]
          source = source.replace('permissions:\n  contents: write', 'permissions:\n  contents: read', 1)
          path.write_text(source, encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "容量計算をprefix sumと二分探索へ最適化する"
          git push origin HEAD:fix/scheduler-capacity-search
      - name: Upload capacity apply log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: capacity-apply-log
          path: capacity-apply.log
          if-no-files-found: error

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and regression tests
        shell: bash
        run: set -o pipefail; npm test 2>&1 | tee verify-tests.log

      - name: Upload verify failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-failure-log
          path: verify-tests.log
          if-no-files-found: ignore

      - name: Cloudflare API integration tests
        run: npm run test:integration:api

      - name: Production build
        run: npm run build

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: IndexedDB browser integration tests
        run: npm run test:integration:browser

      - name: Browser end-to-end tests
        shell: bash
        run: set -o pipefail; npm run test:e2e 2>&1 | tee browser-e2e.log

      - name: PWA update and storage compatibility
        shell: bash
        run: set -o pipefail; npm run test:pwa:update 2>&1 | tee -a browser-e2e.log

      - name: Upload browser failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-failure-log
          path: browser-e2e.log
          if-no-files-found: ignore

  ios-webkit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install WebKit
        run: npx playwright install --with-deps webkit

      - name: iPhone and iPad fixed-navigation regression
        shell: bash
        env:
          BROWSER: webkit
        run: set -o pipefail; node scripts/bottom-navigation-browser.mjs 2>&1 | tee ios-webkit.log

      - name: iOS pagehide emergency-cache regression
        shell: bash
        run: set -o pipefail; node scripts/emergency-cache-webkit.mjs 2>&1 | tee -a ios-webkit.log

      - name: Upload WebKit failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-webkit-failure-log
          path: ios-webkit.log
          if-no-files-found: ignore
