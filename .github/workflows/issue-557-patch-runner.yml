name: Issue 557 patch runner

on:
  push:
    branches:
      - fix/issue-557-memory-import-owner-guard

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/issue-557-runner-enable
      - run: cp scripts/apply-issue-557.mjs /tmp/apply-issue-557.mjs
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-557-memory-import-owner-guard
          clean: true
      - run: |
          node /tmp/apply-issue-557.mjs
          node scripts/memory-import-save-resilience.test.mjs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/features/memory/ui/MemoryImportExport.tsx scripts/memory-import-save-resilience.test.mjs
          git commit -m "fix: guard memory imports across owner changes"
          git push origin HEAD:fix/issue-557-memory-import-owner-guard
